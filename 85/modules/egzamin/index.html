<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nauka do egzaminu Jachtowy Sternik Morski / Żeglarz Jachtowy - baza pytań egzaminacyjnych">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Egzamin ŻJ/JSM">

    <title>Egzamin ŻJ / JSM - Baza Pytań</title>
    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
    <link rel="icon" type="image/svg+xml" href="../../assets/icon-egzamin.svg">
    <link rel="apple-touch-icon" href="../../assets/icon-192x192.png">
    <link rel="manifest" href="../../manifest.json">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Unified Theme -->
    <link rel="stylesheet" href="../../styles/theme.css">

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PDF.js for rendering exam questions from PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- Shared utilities -->
    <script src="../../js/storage-utils.js"></script>
    <script src="../../js/leitner.js"></script>

    <!-- Exam PDF storage (IndexedDB) -->
    <script src="../../js/exam-pdf-storage.js"></script>

    <!-- PDF page renderer (singleton with LRU cache) -->
    <script src="../../js/pdf-renderer.js"></script>

    <style>
        /* Module-specific styles only - base styles in theme.css */

        /* Answer button animations */
        .answer-btn {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .answer-btn:active {
            transform: scale(0.96);
        }

        /* Correct/incorrect animations */
        @keyframes correct-pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @keyframes incorrect-shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .correct-btn {
            animation: correct-pulse 0.6s ease-out;
        }

        .incorrect-btn {
            animation: incorrect-shake 0.4s ease-out;
        }

        /* Image zoom modal */
        .image-modal {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem; /* fallback for browsers without safe-area support */
            padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
            cursor: zoom-out;
        }

        .image-modal img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 0.5rem;
        }

        /* Progress bar */
        .progress-fill {
            transition: width 0.3s ease;
        }

        /* Category badge */
        .category-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
        }

        /* Leitner box colors */
        .leitner-box-1 { --box-color: #ef4444; }
        .leitner-box-2 { --box-color: #f97316; }
        .leitner-box-3 { --box-color: #eab308; }
        .leitner-box-4 { --box-color: #22c55e; }
        .leitner-box-5 { --box-color: #3b82f6; }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="ocean-bg">
        <div class="wave wave-1"></div>
        <div class="wave wave-2"></div>
        <div class="wave wave-3"></div>
    </div>
    <div class="stars"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // PdfRenderer loaded from pwa/js/pdf-renderer.js (global)

        // ==========================================
        // CATEGORIES (8 categories matching Android)
        // ==========================================
        const CATEGORIES = {
            JACHTY_ZAGLOWE: { id: 'jachty_zaglowe', name: 'Jachty Żaglowe Morskie', color: 'amber' },
            LOCJA: { id: 'locja', name: 'Locja', color: 'blue' },
            METEOROLOGIA: { id: 'meteorologia', name: 'Meteorologia', color: 'cyan' },
            NAWIGACJA: { id: 'nawigacja', name: 'Nawigacja', color: 'green' },
            PLANOWANIE: { id: 'planowanie', name: 'Planowanie Rejsów', color: 'orange' },
            PRAWO: { id: 'prawo', name: 'Prawo', color: 'indigo' },
            RATOWNICTWO: { id: 'ratownictwo', name: 'Ratownictwo', color: 'red' },
            SYGNALY: { id: 'sygnaly', name: 'Sygnały i Łączność', color: 'purple' },
        };

        // ==========================================
        // QUESTION DATABASE - loaded from exam_questions.json
        // ==========================================

        // Category name mapping: JSON display name -> internal PWA category id
        const CATEGORY_NAME_TO_ID = {
            'JACHTY ŻAGLOWE MORSKIE': 'jachty_zaglowe',
            'LOCJA': 'locja',
            'METEOROLOGIA': 'meteorologia',
            'NAWIGACJA': 'nawigacja',
            'PLANOWANIE REJSÓW': 'planowanie',
            'PRAWO': 'prawo',
            'RATOWNICTWO': 'ratownictwo',
            'SYGNAŁY I ŁĄCZNOŚĆ': 'sygnaly',
        };

        /**
         * Transform a question from JSON format to the internal PWA format.
         * New format: { id, category, correct_answer, answer_count, pdf_page, crop_y_start, crop_y_end, page_height }
         */
        function transformQuestion(q) {
            return {
                id: q.id,
                category: CATEGORY_NAME_TO_ID[q.category.toUpperCase()] || q.category.toLowerCase().replace(/\s+/g, '_'),
                correctAnswer: q.correct_answer || 'A',
                answerCount: q.answer_count || 3,
                pdfPage: q.pdf_page,
                cropYStart: q.crop_y_start,
                cropYEnd: q.crop_y_end,
                pageHeight: q.page_height,
            };
        }

        // Will be populated after fetch; starts empty
        let QUESTIONS_DB = [];

        // ==========================================
        // QUIZ MODES
        // ==========================================
        const MODES = {
            MENU: 'menu',
            LEARN: 'learn',
            EXAM: 'exam',
            RESULTS: 'results',
            LEITNER_OVERVIEW: 'leitner_overview',
            LEITNER_SESSION: 'leitner_session',
            LEITNER_COMPLETE: 'leitner_complete',
        };

        // ==========================================
        // LEITNER SYSTEM — thin wrappers over shared pwa/js/leitner.js
        // ==========================================
        const _leitnerStorage = new StorageUtils('openanchor');
        const LEITNER_BOX_COUNT = 5;

        function loadLeitnerState() {
            const state = _leitnerStorage.get('leitner', null);
            // Migrate from old session-based format (questionStates → boxes)
            if (state && state.questionStates && !state.boxes) {
                const boxes = {};
                Object.entries(state.questionStates).forEach(([id, data]) => {
                    boxes[id] = { box: data.box || 1, lastReview: Date.now(), reviewCount: 0 };
                });
                const migrated = { boxes };
                _leitnerStorage.set('leitner', migrated);
                return migrated;
            }
            return state || { boxes: {} };
        }

        function saveLeitnerState(state) {
            _leitnerStorage.set('leitner', state);
        }

        function getBoxForQuestion(leitnerState, questionId) {
            return (leitnerState.boxes && leitnerState.boxes[questionId] && leitnerState.boxes[questionId].box) || 1;
        }

        function isDueForReview(leitnerState, questionId) {
            const qData = leitnerState.boxes && leitnerState.boxes[questionId];
            return Leitner.isDueForReview(qData);
        }

        function getDueQuestions(leitnerState, questions) {
            return Leitner.getDueQuestions(leitnerState, questions);
        }

        function getBoxCounts(leitnerState, questions) {
            const counts = [0, 0, 0, 0, 0];
            questions.forEach(q => {
                const box = getBoxForQuestion(leitnerState, q.id);
                counts[box - 1]++;
            });
            return counts;
        }

        function advanceQuestion(leitnerState, questionId, correct) {
            return Leitner.updateLeitnerState(leitnerState, questionId, correct);
        }

        // ==========================================
        // STORAGE — using shared pwa/js/storage-utils.js
        // ==========================================
        const _examStorage = new StorageUtils('openanchor');

        function loadProgress() {
            return _examStorage.get('exam_progress', { answered: {}, stats: { correct: 0, incorrect: 0, total: 0 } });
        }

        function saveProgress(progress) {
            _examStorage.set('exam_progress', progress);
        }

        function loadLearnPosition() {
            return _examStorage.get('learn_position', { questionId: null, timestamp: 0 });
        }

        function saveLearnPosition(questionId) {
            _examStorage.set('learn_position', { questionId, timestamp: Date.now() });
        }

        // ==========================================
        // CATEGORY COLOR HELPERS (8 categories)
        // ==========================================
        function getCategoryColors(colorName) {
            const colors = {
                amber: { bg: 'rgba(245, 158, 11, 0.15)', border: 'rgba(245, 158, 11, 0.3)', text: '#fbbf24', dot: '#f59e0b' },
                blue: { bg: 'rgba(59, 130, 246, 0.15)', border: 'rgba(59, 130, 246, 0.3)', text: '#60a5fa', dot: '#3b82f6' },
                cyan: { bg: 'rgba(6, 182, 212, 0.15)', border: 'rgba(6, 182, 212, 0.3)', text: '#22d3ee', dot: '#06b6d4' },
                green: { bg: 'rgba(34, 197, 94, 0.15)', border: 'rgba(34, 197, 94, 0.3)', text: '#4ade80', dot: '#22c55e' },
                indigo: { bg: 'rgba(99, 102, 241, 0.15)', border: 'rgba(99, 102, 241, 0.3)', text: '#a5b4fc', dot: '#6366f1' },
                orange: { bg: 'rgba(249, 115, 22, 0.15)', border: 'rgba(249, 115, 22, 0.3)', text: '#fb923c', dot: '#f97316' },
                red: { bg: 'rgba(239, 68, 68, 0.15)', border: 'rgba(239, 68, 68, 0.3)', text: '#f87171', dot: '#ef4444' },
                purple: { bg: 'rgba(168, 85, 247, 0.15)', border: 'rgba(168, 85, 247, 0.3)', text: '#c084fc', dot: '#a855f7' },
            };
            return colors[colorName] || colors.amber;
        }

        // ==========================================
        // ANSWER LABELS HELPER
        // ==========================================
        function getAnswerLabels(answerCount) {
            return ['A', 'B', 'C', 'D'].slice(0, answerCount);
        }

        // ==========================================
        // SHARED COMPONENTS
        // ==========================================

        function Header({ title, onBack, rightContent }) {
            const isMainMenu = !onBack;
            return (
                <div className="oa-header">
                    {isMainMenu ? (
                        <a href="../../index.html" className="oa-back-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                            <span>Menu</span>
                        </a>
                    ) : (
                        <button
                            onClick={onBack}
                            className="oa-back-btn"
                            aria-label="Wróć"
                        >
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="20" height="20">
                                <polyline points="15 18 9 12 15 6"/>
                            </svg>
                            <span>Wróć</span>
                        </button>
                    )}
                    <h1 className="oa-header-title">{title}</h1>
                    {rightContent || <div style={{width: '40px'}}></div>}
                </div>
            );
        }

        function CategoryBadge({ categoryId }) {
            const cat = Object.values(CATEGORIES).find(c => c.id === categoryId);
            if (!cat) return null;
            const colors = getCategoryColors(cat.color);
            return (
                <span
                    className="category-badge"
                    style={{ background: colors.bg, border: `1px solid ${colors.border}`, color: colors.text }}
                >
                    <span style={{ width: 5, height: 5, borderRadius: '50%', background: colors.dot, display: 'inline-block' }}></span>
                    {cat.name}
                </span>
            );
        }

        /**
         * Displays the question image rendered from PDF with optional zoom-to-fullscreen.
         */
        function QuestionImageCard({ question }) {
            const [imageDataUrl, setImageDataUrl] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(false);
            const [zoomed, setZoomed] = useState(false);

            useEffect(() => {
                let cancelled = false;
                setLoading(true);
                setError(false);
                setImageDataUrl(null);

                if (PdfRenderer.isLoaded()) {
                    PdfRenderer.renderQuestion(question.pdfPage, question.cropYStart, question.cropYEnd, question.pageHeight)
                        .then(dataUrl => {
                            if (!cancelled) {
                                setImageDataUrl(dataUrl);
                                setLoading(false);
                            }
                        })
                        .catch(() => {
                            if (!cancelled) {
                                setError(true);
                                setLoading(false);
                            }
                        });
                } else {
                    setError(true);
                    setLoading(false);
                }

                return () => { cancelled = true; };
            }, [question.id]);

            return (
                <div className="rounded-2xl bg-white border border-white/10 overflow-hidden">
                    {/* Header: category + question number */}
                    <div className="flex items-center justify-between px-4 py-2.5">
                        <CategoryBadge categoryId={question.category} />
                        <span className="text-sm text-slate-400">#{question.id}</span>
                    </div>

                    {/* Question image from PDF */}
                    {loading ? (
                        <div className="flex items-center justify-center h-32 bg-white">
                            <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                        </div>
                    ) : error || !imageDataUrl ? (
                        <div className="flex items-center justify-center h-28 bg-slate-800 text-slate-500 text-sm">
                            Nie udało się załadować pytania
                        </div>
                    ) : (
                        <img
                            src={imageDataUrl}
                            alt={`Pytanie #${question.id}`}
                            className="w-full h-auto cursor-zoom-in"
                            onClick={() => setZoomed(true)}
                        />
                    )}

                    {/* Fullscreen zoom modal */}
                    {zoomed && imageDataUrl && (
                        <div className="image-modal" onClick={() => setZoomed(false)}>
                            <img src={imageDataUrl} alt={`Pytanie #${question.id}`} />
                        </div>
                    )}
                </div>
            );
        }

        /**
         * Row of A / B / C answer buttons with color state feedback.
         * Matches the Android AnswerButtonsRow / AnswerButton pattern.
         */
        function AnswerButtonsRow({ answerCount, correctAnswer, selectedAnswer, onSelectAnswer, showCorrect }) {
            const labels = getAnswerLabels(answerCount);

            function getState(label) {
                if (!selectedAnswer) return 'default';
                if (showCorrect && label === correctAnswer) return 'correct';
                if (!showCorrect && label === selectedAnswer) return 'selected';
                if (showCorrect && label === selectedAnswer && label !== correctAnswer) return 'incorrect';
                return 'default';
            }

            return (
                <div className="flex gap-3">
                    {labels.map(label => {
                        const state = getState(label);

                        let bgClass, borderClass, textClass, animClass = '';
                        switch (state) {
                            case 'correct':
                                bgClass = 'bg-green-500/20';
                                borderClass = 'border-green-500';
                                textClass = 'text-green-400';
                                animClass = 'correct-btn';
                                break;
                            case 'incorrect':
                                bgClass = 'bg-red-500/20';
                                borderClass = 'border-red-500';
                                textClass = 'text-red-400';
                                animClass = 'incorrect-btn';
                                break;
                            case 'selected':
                                bgClass = 'bg-amber-500/20';
                                borderClass = 'border-amber-500';
                                textClass = 'text-amber-400';
                                break;
                            default:
                                bgClass = 'bg-white/5';
                                borderClass = 'border-white/15';
                                textClass = 'text-white';
                        }

                        const icon = state === 'correct'
                            ? (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"
                                strokeLinecap="round" strokeLinejoin="round" width="24" height="24">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>)
                            : state === 'incorrect'
                            ? (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"
                                strokeLinecap="round" strokeLinejoin="round" width="24" height="24">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>)
                            : (<span className="text-lg font-bold">{label}</span>);

                        return (
                            <button
                                key={label}
                                onClick={() => !selectedAnswer && onSelectAnswer(label)}
                                disabled={!!selectedAnswer}
                                className={`answer-btn flex-1 h-14 sm:h-16 rounded-2xl border-2 flex items-center justify-center ${bgClass} ${borderClass} ${textClass} ${animClass} disabled:cursor-default`}
                            >
                                {icon}
                            </button>
                        );
                    })}
                </div>
            );
        }

        function ProgressBar({ current, total, correct, incorrect, onNavigate }) {
            const pct = total > 0 ? (current / total) * 100 : 0;

            const handleClick = (e) => {
                if (!onNavigate) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const clickedPct = x / rect.width;
                const targetIndex = Math.floor(clickedPct * total);
                const clampedIndex = Math.max(0, Math.min(total - 1, targetIndex));
                onNavigate(clampedIndex);
            };

            return (
                <div className="px-4 py-2">
                    <div className="flex items-center justify-between text-sm text-white/40 mb-1.5 gap-2">
                        <span className="whitespace-nowrap">Pytanie {current} / {total}</span>
                        <div className="flex gap-2 sm:gap-3 whitespace-nowrap">
                            <span className="text-green-400">{correct} OK</span>
                            <span className="text-red-400">{incorrect} Err</span>
                        </div>
                    </div>
                    <div
                        className={`h-1 bg-white/5 rounded-full overflow-hidden ${onNavigate ? 'cursor-pointer hover:h-2 transition-all' : ''}`}
                        onClick={handleClick}
                    >
                        <div
                            className="progress-fill h-full rounded-full bg-gradient-to-r from-amber-500 to-amber-400"
                            style={{ width: `${pct}%` }}
                        />
                    </div>
                </div>
            );
        }

        function CategorySelector({ categories, selectedCategories, onToggle, onSelectAll, onDeselectAll }) {
            return (
                <div className="space-y-2 mb-4">
                    <div className="flex gap-2 mb-2">
                        <button onClick={onSelectAll} className="text-sm text-amber-400 hover:text-amber-300">Zaznacz wszystkie</button>
                        <span className="text-sm text-white/20">|</span>
                        <button onClick={onDeselectAll} className="text-sm text-white/40 hover:text-white/60">Odznacz</button>
                    </div>
                    {Object.values(categories).map(cat => {
                        const colors = getCategoryColors(cat.color);
                        const isSelected = selectedCategories.includes(cat.id);
                        return (
                            <button
                                key={cat.id}
                                onClick={() => onToggle(cat.id)}
                                className={`w-full flex items-center gap-3 rounded-xl px-4 py-3 border transition-all ${
                                    isSelected ? 'bg-white/10 border-white/20' : 'bg-white/3 border-white/5 opacity-50'
                                }`}
                            >
                                <span style={{
                                    width: 20, height: 20, borderRadius: 6,
                                    background: isSelected ? colors.dot : 'transparent',
                                    border: `2px solid ${isSelected ? colors.dot : 'rgba(255,255,255,0.2)'}`,
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    fontSize: 12, color: 'white', fontWeight: 'bold'
                                }}>
                                    {isSelected ? '\u2713' : ''}
                                </span>
                                <span className="text-base">{cat.name}</span>
                            </button>
                        );
                    })}
                </div>
            );
        }

        // ==========================================
        // PDF IMPORT SCREEN
        // ==========================================
        function ImportPdfScreen({ onImportComplete }) {
            const [importing, setImporting] = useState(false);
            const [progress, setProgressText] = useState('');
            const [hashWarning, setHashWarning] = useState(null);

            const handleFileSelect = async (e) => {
                const file = e.target.files[0];
                if (!file || !file.name.toLowerCase().endsWith('.pdf')) return;

                setImporting(true);
                setProgressText('Wczytywanie pliku...');

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    setProgressText('Obliczanie sumy kontrolnej...');
                    const { valid, hash } = await verifyPdfHash(arrayBuffer);
                    const blob = new Blob([arrayBuffer], { type: 'application/pdf' });

                    const meta = {
                        hash: hash,
                        filename: file.name,
                        importDate: new Date().toISOString(),
                        fileSize: file.size,
                    };

                    if (!valid) {
                        setImporting(false);
                        setHashWarning({ hash: hash, blob: blob, meta: meta });
                        return;
                    }

                    await finishImport(blob, meta);
                } catch (err) {
                    setProgressText('Błąd importu: ' + err.message);
                    setImporting(false);
                }
            };

            const finishImport = async (blob, meta) => {
                setImporting(true);
                setHashWarning(null);
                setProgressText('Zapisywanie bazy pytań...');
                await savePdfData(blob, meta);

                setProgressText('Ładowanie pytań...');
                await PdfRenderer.loadFromBlob(blob);

                setImporting(false);
                onImportComplete();
            };

            return (
                <>
                    <Header title="Egzamin ZJ / JSM" />
                    <div className="relative z-10 max-w-lg md:max-w-2xl mx-auto px-4 py-8">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-amber-500/20 to-amber-700/20 border border-amber-500/20 flex items-center justify-center">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" strokeWidth="1.5"
                                    strokeLinecap="round" strokeLinejoin="round" width="40" height="40">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                    <line x1="12" y1="18" x2="12" y2="12"/>
                                    <line x1="9" y1="15" x2="15" y2="15"/>
                                </svg>
                            </div>
                            <h1 className="text-2xl font-bold mb-2">Importuj bazę pytań</h1>
                            <p className="text-sm text-white/50 leading-relaxed max-w-sm mx-auto">
                                Aby korzystać z modułu egzaminacyjnego, zaimportuj plik PDF z bazą pytań egzaminacyjnych.
                            </p>
                        </div>

                        {!importing && !hashWarning && (
                            <div className="space-y-4">
                                <label className="block w-full py-4 rounded-2xl bg-gradient-to-r from-amber-600 to-amber-500 text-white font-bold text-base text-center cursor-pointer hover:from-amber-500 hover:to-amber-400 transition-all active:scale-[0.98]">

                    {/* Action buttons */}

                        >

        // ==========================================
        // LEARN MODE
        // ==========================================
        function LearnScreen({ questions, progress, onUpdateProgress, onBack }) {
            const [selectedCategories, setSelectedCategories] = useState(Object.values(CATEGORIES).map(c => c.id));
            const [showCategoryFilter, setShowCategoryFilter] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');

            const filteredQuestions = useMemo(() => {
                let result = questions.filter(q => selectedCategories.includes(q.category));
                if (searchQuery.trim()) {
                    const query = searchQuery.trim().toLowerCase();
                    result = result.filter(q =>
                        q.question.toLowerCase().includes(query) ||
                        (q.answers && q.answers.some(a => a.text && a.text.toLowerCase().includes(query)))
                    );
                }
                return result;
            }, [questions, selectedCategories, searchQuery]);

            // Initialize currentIndex with saved position
            const [currentIndex, setCurrentIndex] = useState(() => {
                const savedPos = loadLearnPosition();
                if (savedPos.questionId) {
                    const index = filteredQuestions.findIndex(q => q.id === savedPos.questionId);
                    if (index >= 0) return index;
                }
                return 0;
            });

            const currentQuestion = filteredQuestions[currentIndex];

            // Save position whenever currentIndex or currentQuestion changes
            useEffect(() => {
                if (currentQuestion) {
                    saveLearnPosition(currentQuestion.id);
                }
            }, [currentIndex, currentQuestion]);

            const handleAnswer = useCallback((label) => {
                if (selectedAnswer) return;
                setSelectedAnswer(label);

                const isCorrect = label === currentQuestion.correctAnswer;
                const newProgress = { ...progress };
                newProgress.answered = { ...progress.answered };
                // Adjust stats if question was already answered before (re-visit)
                const previousAnswer = newProgress.answered[currentQuestion.id];
                newProgress.stats = { ...newProgress.stats };
                if (previousAnswer) {
                    // Undo old stats before recording new answer
                    newProgress.stats.total--;
                    if (previousAnswer.correct) newProgress.stats.correct--;
                    else newProgress.stats.incorrect--;
                }
                newProgress.answered[currentQuestion.id] = {
                    answer: label,
                    correct: isCorrect,
                    timestamp: Date.now()
                };
                newProgress.stats.total++;
                if (isCorrect) newProgress.stats.correct++;
                else newProgress.stats.incorrect++;
                onUpdateProgress(newProgress);
            }, [selectedAnswer, currentQuestion, progress, onUpdateProgress]);

            const handleNext = useCallback(() => {
                if (currentIndex < filteredQuestions.length - 1) {
                    setCurrentIndex(i => i + 1);
                } else {
                    setCurrentIndex(0);
                }
                setSelectedAnswer(null);
            }, [currentIndex, filteredQuestions.length]);

            const handlePrev = useCallback(() => {
                if (currentIndex > 0) {
                    setCurrentIndex(i => i - 1);
                    setSelectedAnswer(null);
                }
            }, [currentIndex]);

            if (filteredQuestions.length === 0) {
                return (
                    <div className="relative z-10 min-h-screen flex flex-col">
                        <Header title="Nauka" onBack={onBack} />
                        <div className="flex-1 flex items-center justify-center px-4">
                            <div className="text-center">
                                <p className="text-white/40 text-lg mb-2">Brak pytań</p>
                                <p className="text-white/30 text-sm">Brak pytań w wybranych kategoriach</p>
                                <button
                                    onClick={() => setShowCategoryFilter(true)}
                                    className="mt-4 px-4 py-2 rounded-xl bg-amber-500/20 text-amber-400 text-sm"
                                >
                                    Zmień kategorie
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="relative z-10 min-h-screen flex flex-col">
                    <Header
                        title="Nauka"
                        onBack={onBack}
                        rightContent={
                            <button
                                onClick={() => setShowCategoryFilter(!showCategoryFilter)}
                                className="w-11 h-11 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 transition-colors"
                                aria-label="Filtruj kategorie"
                            >
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
                                    strokeLinecap="round" strokeLinejoin="round" width="20" height="20">
                                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                                </svg>
                            </button>
                        }
                    />

                    <ProgressBar
                        current={currentIndex + 1}
                        total={filteredQuestions.length}
                        correct={progress.stats.correct}
                        incorrect={progress.stats.incorrect}
                        onNavigate={(index) => {
                            setCurrentIndex(index);
                            setSelectedAnswer(null);
                        }}
                    />

                    {/* Search input */}
                    <div className="px-4 pb-2">
                        <input
                            type="text"
                            value={searchQuery}
                            onChange={(e) => { setSearchQuery(e.target.value); setCurrentIndex(0); setSelectedAnswer(null); }}
                            placeholder="Szukaj pytania..."
                            className="w-full px-3 py-2 rounded-xl bg-white/5 border border-white/10 text-white text-sm placeholder-white/30 focus:outline-none focus:border-amber-500/50"
                        />
                    </div>

                    {showCategoryFilter && (
                        <div className="px-4 pb-2">
                            <CategorySelector
                                categories={CATEGORIES}
                                selectedCategories={selectedCategories}
                                onToggle={(id) => {
                                    const newCategories = selectedCategories.includes(id)
                                        ? selectedCategories.filter(c => c !== id)
                                        : [...selectedCategories, id];
                                    setSelectedCategories(newCategories);

                                    // Try to restore saved position in new filtered list
                                    const savedPos = loadLearnPosition();
                                    if (savedPos.questionId) {
                                        const newFiltered = questions.filter(q => newCategories.includes(q.category));
                                        const index = newFiltered.findIndex(q => q.id === savedPos.questionId);
                                        setCurrentIndex(index >= 0 ? index : 0);
                                    } else {
                                        setCurrentIndex(0);
                                    }
                                    setSelectedAnswer(null);
                                }}
                                onSelectAll={() => {
                                    setSelectedCategories(Object.values(CATEGORIES).map(c => c.id));

                                    // Try to restore saved position with all categories
                                    const savedPos = loadLearnPosition();
                                    if (savedPos.questionId) {
                                        const index = questions.findIndex(q => q.id === savedPos.questionId);
                                        setCurrentIndex(index >= 0 ? index : 0);
                                    } else {
                                        setCurrentIndex(0);
                                    }
                                }}
                                onDeselectAll={() => setSelectedCategories([])}
                            />
                        </div>
                    )}

                    {/* Question */}
                    <div className="flex-1 px-4 pb-4" style={{paddingBottom: 'max(1rem, env(safe-area-inset-bottom))'}}>
                        <div className="max-w-2xl mx-auto space-y-3">
                            <QuestionImageCard question={currentQuestion} />

                            <AnswerButtonsRow
                                answerCount={currentQuestion.answerCount}
                                correctAnswer={currentQuestion.correctAnswer}
                                selectedAnswer={selectedAnswer}
                                onSelectAnswer={handleAnswer}
                                showCorrect={selectedAnswer != null}
                            />

                            <div className="flex gap-3 mt-4">
                                <button
                                    onClick={handlePrev}
                                    disabled={currentIndex === 0}
                                    className="flex-1 py-4 rounded-2xl bg-white/5 border border-white/10 text-base font-semibold disabled:opacity-20 hover:bg-white/10 transition-all"
                                >
                                    Poprzednie
                                </button>
                                <button
                                    onClick={handleNext}
                                    className="flex-1 py-4 rounded-2xl bg-gradient-to-r from-amber-600 to-amber-500 text-base font-bold hover:from-amber-500 hover:to-amber-400 transition-all"
                                >
                                    {selectedAnswer ? 'Nastepne' : 'Pomin'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // EXAM MODE
        // ==========================================
        function ExamScreen({ questions, onFinish, onBack }) {
            const EXAM_QUESTION_COUNT = Math.min(30, questions.length);
            const EXAM_TIME_MINUTES = 45;

            const [examQuestions] = useState(() => {
                const shuffled = [...questions].sort(() => Math.random() - 0.5);
                return shuffled.slice(0, EXAM_QUESTION_COUNT);
            });

            const [currentIndex, setCurrentIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [timeLeft, setTimeLeft] = useState(EXAM_TIME_MINUTES * 60);
            const [isFinished, setIsFinished] = useState(false);

            useEffect(() => {
                if (isFinished) return;
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            setIsFinished(true);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isFinished]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const handleAnswer = (label) => {
                setAnswers(prev => ({ ...prev, [examQuestions[currentIndex].id]: label }));
            };

            const handleFinishExam = () => {
                const results = examQuestions.map(q => ({
                    question: q,
                    userAnswer: answers[q.id] || null,
                    correct: answers[q.id] === q.correctAnswer,
                }));
                onFinish(results, EXAM_TIME_MINUTES * 60 - timeLeft);
            };

            // Intentionally omitting handleFinishExam from deps — fire-once effect when exam ends
            useEffect(() => {
                if (isFinished) {
                    handleFinishExam();
                }
            }, [isFinished]);

            if (isFinished) {
                return null;
            }

            const currentQuestion = examQuestions[currentIndex];
            const answeredCount = Object.keys(answers).length;
            const timeWarning = timeLeft < 300;

            return (
                <div className="relative z-10 min-h-screen flex flex-col">
                    <Header
                        title="Egzamin"
                        onBack={() => {
                            if (confirm('Na pewno chcesz przerwac egzamin? Postep zostanie utracony.')) {
                                onBack();
                            }
                        }}
                        rightContent={
                            <div className={`px-3 py-1.5 rounded-xl text-sm font-mono font-bold ${
                                timeWarning ? 'bg-red-500/20 text-red-400' : 'bg-white/5 text-white/60'
                            }`}>
                                {formatTime(timeLeft)}
                            </div>
                        }
                    />

                    <ProgressBar
                        current={currentIndex + 1}
                        total={examQuestions.length}
                        correct={answeredCount}
                        incorrect={0}
                    />

                    <div className="flex-1 px-4 pb-4" style={{paddingBottom: 'max(1rem, env(safe-area-inset-bottom))'}}>
                        <div className="max-w-2xl mx-auto space-y-3">
                            <QuestionImageCard question={currentQuestion} />

                            {/* Answer buttons - exam mode: no correct answer shown */}
                            <AnswerButtonsRow
                                answerCount={currentQuestion.answerCount}
                                correctAnswer={currentQuestion.correctAnswer}
                                selectedAnswer={answers[currentQuestion.id] || null}
                                onSelectAnswer={(label) => handleAnswer(label)}
                                showCorrect={false}
                            />

                            {/* Question navigation dots */}
                            <div className="grid gap-2 mt-3 justify-center" style={{gridTemplateColumns: 'repeat(auto-fill, minmax(2.75rem, 1fr))'}}>
                                {examQuestions.map((q, i) => (
                                    <button
                                        key={q.id}
                                        onClick={() => setCurrentIndex(i)}
                                        className={`min-w-[2.75rem] min-h-[2.75rem] rounded-lg text-xs font-bold transition-all ${
                                            i === currentIndex
                                                ? 'bg-amber-500 text-white'
                                                : answers[q.id]
                                                    ? 'bg-white/15 text-white/60'
                                                    : 'bg-white/5 text-white/25'
                                        }`}
                                    >
                                        {i + 1}
                                    </button>
                                ))}
                            </div>

                            <div className="flex gap-3 mt-4">
                                <button
                                    onClick={() => setCurrentIndex(i => Math.max(0, i - 1))}
                                    disabled={currentIndex === 0}
                                    className="flex-1 py-4 rounded-2xl bg-white/5 border border-white/10 text-base font-semibold disabled:opacity-20 hover:bg-white/10 transition-all"
                                >
                                    Poprzednie
                                </button>
                                {currentIndex < examQuestions.length - 1 ? (
                                    <button
                                        onClick={() => setCurrentIndex(i => i + 1)}
                                        className="flex-1 py-4 rounded-2xl bg-gradient-to-r from-amber-600 to-amber-500 text-base font-bold hover:from-amber-500 hover:to-amber-400 transition-all"
                                    >
                                        Nastepne
                                    </button>
                                ) : (
                                    <button
                                        onClick={() => {
                                            const unanswered = examQuestions.length - answeredCount;
                                            if (unanswered > 0) {
                                                if (!confirm(`Masz ${unanswered} pytań bez odpowiedzi. Na pewno chcesz zakończyć?`)) return;
                                            }
                                            handleFinishExam();
                                        }}
                                        className="flex-1 py-4 rounded-2xl bg-gradient-to-r from-green-600 to-green-500 text-base font-bold hover:from-green-500 hover:to-green-400 transition-all"
                                    >
                                        Zakoncz ({answeredCount}/{examQuestions.length})
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // RESULTS SCREEN
        // ==========================================
        function ResultsScreen({ results, timeTaken, onBack, onRetry }) {
            const correct = results.filter(r => r.correct).length;
            const total = results.length;
            const pct = Math.round((correct / total) * 100);

                                <div className="text-xs text-white/30 mt-2">

                                            <span style={{ width: 8, height: 8, borderRadius: '50%', background: colors.dot, flexShrink: 0 }}></span>
                                            <span className="text-sm flex-1 truncate">{cat.name}</span>
                                            <span className={`text-sm font-bold ${catPct >= 70 ? 'text-green-400' : 'text-red-400'}`}>
                                                {catCorrect}/{catResults.length} ({catPct}%)
                                            </span>

                                })}
                            </div>

                            <button
                                onClick={() => setShowDetails(!showDetails)}
                                className="w-full py-3 rounded-2xl bg-white/5 border border-white/10 text-sm text-white/50 hover:bg-white/10 mb-4"

                                {showDetails ? 'Ukryj szczegóły' : 'Pokaż szczegóły pytań'}

                                <div className="space-y-3 mb-6">

        // ==========================================
        // LEITNER SESSION SCREEN
        // ==========================================
        function LeitnerSessionScreen({ dueQuestions, leitnerState, onUpdateLeitner, onComplete, onBack }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [sessionCorrect, setSessionCorrect] = useState(0);
            const [sessionIncorrect, setSessionIncorrect] = useState(0);
            const [currentLeitnerState, setCurrentLeitnerState] = useState(leitnerState);

            const currentQuestion = dueQuestions[currentIndex];
            const isSessionComplete = !currentQuestion;

            // Use refs to track latest values for onComplete to avoid stale closures
            const sessionCorrectRef = useRef(0);
            const sessionIncorrectRef = useRef(0);
            const leitnerStateRef = useRef(currentLeitnerState);
            sessionCorrectRef.current = sessionCorrect;
            sessionIncorrectRef.current = sessionIncorrect;
            leitnerStateRef.current = currentLeitnerState;

            // Intentionally omitting onComplete from deps — fire-once effect; refs ensure fresh values
            useEffect(() => {
                if (isSessionComplete) {
                    onComplete(sessionCorrectRef.current, sessionIncorrectRef.current, leitnerStateRef.current);
                }
            }, [isSessionComplete]);

            if (isSessionComplete) {
                return null;
            }

            const currentBox = getBoxForQuestion(currentLeitnerState, currentQuestion.id);

            const handleAnswer = (label) => {
                if (selectedAnswer) return;
                setSelectedAnswer(label);

                const isCorrect = label === currentQuestion.correctAnswer;
                const newState = advanceQuestion(currentLeitnerState, currentQuestion.id, isCorrect);
                setCurrentLeitnerState(newState);
                onUpdateLeitner(newState);

                if (isCorrect) setSessionCorrect(c => c + 1);
                else setSessionIncorrect(c => c + 1);
            };

            const handleNext = () => {
                if (currentIndex < dueQuestions.length - 1) {
                    setCurrentIndex(i => i + 1);
                    setSelectedAnswer(null);
                } else {
                    onComplete(sessionCorrectRef.current, sessionIncorrectRef.current, leitnerStateRef.current);
                }
            };

            const boxColors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6'];

            return (
                <div className="relative z-10 min-h-screen flex flex-col">
                    <Header
                        title="Sesja Leitner"
                        onBack={() => {
                            if (confirm('Na pewno chcesz przerwac sesje? Postep zostanie zachowany.')) {
                                onBack();
                            }
                        }}
                        rightContent={
                            <div className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-white/5">
                                <span style={{ width: 8, height: 8, borderRadius: '50%', background: boxColors[currentBox - 1] }}></span>
                                <span className="text-xs text-white/50">P{currentBox}</span>
                            </div>
                        }
                    />

                    <ProgressBar
                        current={currentIndex + 1}
                        total={dueQuestions.length}
                        correct={sessionCorrect}
                        incorrect={sessionIncorrect}
                        onNavigate={(index) => {
                            setCurrentIndex(index);
                            setSelectedAnswer(null);
                        }}
                    />

                    <div className="flex-1 px-4 pb-4" style={{paddingBottom: 'max(1rem, env(safe-area-inset-bottom))'}}>
                        <div className="max-w-2xl mx-auto space-y-3">
                            <QuestionImageCard question={currentQuestion} />

                            <AnswerButtonsRow
                                answerCount={currentQuestion.answerCount}
                                correctAnswer={currentQuestion.correctAnswer}
                                selectedAnswer={selectedAnswer}
                                onSelectAnswer={handleAnswer}
                                showCorrect={selectedAnswer != null}
                            />

                            {/* Box movement indicator */}
                            {selectedAnswer && (
                                <div className="mt-3 text-center">
                                    {selectedAnswer === currentQuestion.correctAnswer ? (
                                        <div className="text-sm text-green-400">
                                            Pudełko {currentBox} &rarr; {Math.min(currentBox + 1, LEITNER_BOX_COUNT)}
                                        </div>
                                    ) : (
                                        <div className="text-sm text-red-400">
                                            Pudełko {currentBox} &rarr; 1
                                        </div>
                                    )}
                                </div>
                            )}

                            <div className="flex gap-3 mt-4">
                                {selectedAnswer ? (
                                    <button
                                        onClick={handleNext}
                                        className="flex-1 py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-blue-500 text-base font-bold hover:from-blue-500 hover:to-blue-400 transition-all"
                                    >
                                        {currentIndex < dueQuestions.length - 1 ? 'Nastepne' : 'Zakoncz sesje'}
                                    </button>
                                ) : (
                                    <div className="flex-1 py-4 rounded-2xl bg-white/5 border border-white/10 text-base text-center text-white/30">
                                        Wybierz odpowiedz
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // MAIN APP
        // ==========================================
        function App() {
            const [pdfReady, setPdfReady] = useState(false);
            const [initializing, setInitializing] = useState(true);
            const [mode, setMode] = useState(MODES.MENU);
            const [progress, setProgress] = useState(loadProgress);
            const [leitnerState, setLeitnerState] = useState(loadLeitnerState);
            const [examResults, setExamResults] = useState(null);
            const [examTime, setExamTime] = useState(0);
            const [leitnerSessionQuestions, setLeitnerSessionQuestions] = useState([]);
            const [leitnerSessionCorrect, setLeitnerSessionCorrect] = useState(0);
            const [leitnerSessionIncorrect, setLeitnerSessionIncorrect] = useState(0);

            useEffect(() => {
                async function init() {
                    try {
                        const imported = await isPdfImported();
                        if (imported) {
                            const blob = await loadPdfBlob();
                            if (blob) {
                                await PdfRenderer.loadFromBlob(blob);
                                setPdfReady(true);
                            }
                        }
                    } catch (err) {
                        console.error('Failed to initialize PDF:', err);
                    }
                    setInitializing(false);
                }
                init();
            }, []);

            const handleChangePdf = useCallback(async () => {
                PdfRenderer.unload();
                await deletePdf();
                setPdfReady(false);
            }, []);

            const updateProgress = useCallback((newProgress) => {
                setProgress(newProgress);
                saveProgress(newProgress);
            }, []);

            const updateLeitner = useCallback((newState) => {
                setLeitnerState(newState);
                saveLeitnerState(newState);
            }, []);

            const handleExamFinish = useCallback((results, timeTaken) => {
                setExamResults(results);
                setExamTime(timeTaken);
                setMode(MODES.RESULTS);
            }, []);

            const handleStartLeitnerSession = useCallback(() => {
                const due = getDueQuestions(leitnerState, QUESTIONS_DB);
                if (due.length === 0) return;

                const shuffled = [...due].sort(() => Math.random() - 0.5);
                setLeitnerSessionQuestions(shuffled);
                setMode(MODES.LEITNER_SESSION);
            }, [leitnerState]);

            const handleLeitnerComplete = useCallback((correct, incorrect, finalState) => {
                setLeitnerSessionCorrect(correct);
                setLeitnerSessionIncorrect(incorrect);
                setLeitnerState(finalState);
                saveLeitnerState(finalState);
                setMode(MODES.LEITNER_COMPLETE);
            }, []);

            const handleResetLeitner = useCallback(() => {
                const freshState = { boxes: {} };
                setLeitnerState(freshState);
                saveLeitnerState(freshState);
            }, []);

            // Initializing: show loading
            if (initializing) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-amber-400 mx-auto mb-4"></div>
                            <p className="text-sm text-white/50">Ładowanie...</p>
                        </div>
                    </div>
                );
            }

            // No PDF imported: show import screen
            if (!pdfReady) {
                return <ImportPdfScreen onImportComplete={() => setPdfReady(true)} />;
            }

            switch (mode) {
                case MODES.MENU:
                    return (
                        <MenuScreen
                            questions={QUESTIONS_DB}
                            progress={progress}
                            leitnerState={leitnerState}
                            onStartLearn={() => setMode(MODES.LEARN)}
                            onStartExam={() => setMode(MODES.EXAM)}
                            onStartLeitner={() => setMode(MODES.LEITNER_OVERVIEW)}
                            onChangePdf={handleChangePdf}
                        />
                    );
                case MODES.LEARN:
                    return (
                        <LearnScreen
                            questions={QUESTIONS_DB}
                            progress={progress}
                            onUpdateProgress={updateProgress}
                            onBack={() => setMode(MODES.MENU)}
                        />
                    );
                case MODES.EXAM:
                    return (
                        <ExamScreen
                            questions={QUESTIONS_DB}
                            onFinish={handleExamFinish}
                            onBack={() => setMode(MODES.MENU)}
                        />
                    );
                case MODES.RESULTS:
                    return (
                        <ResultsScreen
                            results={examResults}
                            timeTaken={examTime}
                            onBack={() => setMode(MODES.MENU)}
                            onRetry={() => setMode(MODES.EXAM)}
                        />
                    );
                case MODES.LEITNER_OVERVIEW:
                    return (
                        <LeitnerOverviewScreen
                            questions={QUESTIONS_DB}
                            leitnerState={leitnerState}
                            onStartSession={handleStartLeitnerSession}
                            onBack={() => setMode(MODES.MENU)}
                            onReset={handleResetLeitner}
                        />
                    );
                case MODES.LEITNER_SESSION:
                    return (
                        <LeitnerSessionScreen
                            dueQuestions={leitnerSessionQuestions}
                            leitnerState={leitnerState}
                            onUpdateLeitner={updateLeitner}
                            onComplete={handleLeitnerComplete}
                            onBack={() => setMode(MODES.LEITNER_OVERVIEW)}
                        />
                    );
                case MODES.LEITNER_COMPLETE:
                    return (
                        <LeitnerCompleteScreen
                            correct={leitnerSessionCorrect}
                            incorrect={leitnerSessionIncorrect}
                            leitnerState={leitnerState}
                            questions={QUESTIONS_DB}
                            onBack={() => setMode(MODES.LEITNER_OVERVIEW)}
                        />
                    );
                default:
                    return null;
            }
        }

        // ==========================================
        // ERROR BOUNDARY
        // ==========================================
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error('ErrorBoundary caught:', error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex items-center justify-center min-h-screen">
                            <div className="text-center p-8">
                                <div className="text-red-400 text-4xl mb-4">⚠️</div>
                                <h2 className="text-xl font-bold text-white mb-2">Wystąpił błąd</h2>
                                <p className="text-white/50 mb-4">Odśwież stronę, aby spróbować ponownie.</p>
                                <button
                                    onClick={() => window.location.reload()}
                                    className="px-6 py-2 bg-amber-500 text-black font-bold rounded-xl hover:bg-amber-400 transition-colors"
                                >
                                    Odśwież stronę
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // Mount - load questions from JSON first, then render
        const root = ReactDOM.createRoot(document.getElementById('root'));

        fetch('exam_questions.json')
            .then(r => r.json())
            .then(data => {
                QUESTIONS_DB = data.map(transformQuestion);
                root.render(<ErrorBoundary><App /></ErrorBoundary>);
            })
            .catch(err => {
                console.error('Failed to load exam questions:', err);
                root.render(
                    <div className="flex items-center justify-center min-h-screen text-red-400">
                        <p>Błąd ładowania pytań. Odśwież stronę.</p>
                    </div>
                );
            });
    </script>
</body>
</html>
