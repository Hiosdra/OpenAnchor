name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'pwa/**'
  workflow_dispatch:

permissions:
  contents: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Checkout gh-pages branch
        id: checkout-ghpages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-branch
        continue-on-error: true

      - name: Initialize gh-pages if needed
        run: |
          if [ "${{ steps.checkout-ghpages.outcome }}" != "success" ]; then
            echo "gh-pages branch doesn't exist, creating it..."
            mkdir -p gh-pages-branch
            cd gh-pages-branch
            git init
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b gh-pages
            echo "# OpenAnchor PWA" > README.md
            git add README.md
            git commit -m "Initialize gh-pages branch"

            # Set remote URL (works whether remote exists or not)
            if git remote get-url origin >/dev/null 2>&1; then
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            else
              git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            fi

            # If another workflow run created gh-pages concurrently, align to it instead of failing with a non-fast-forward push
            if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
              echo "Remote gh-pages branch already exists, fetching and aligning local branch..."
              git fetch origin gh-pages
              git reset --hard origin/gh-pages
            else
              echo "Remote gh-pages branch does not exist, creating it..."
              git push -u origin gh-pages
            fi
          fi

      - name: Deploy to gh-pages root
        run: |
          # Copy PWA files to gh-pages root, preserving PR preview subdirectories
          cd gh-pages-branch

          # Remove all files except PR preview directories (numeric directories)
          find . -maxdepth 1 -type f -not -name '.git*' -delete
          find . -maxdepth 1 -type d -not -name '.' -not -name '..' -not -name '.git' -not -regex '.*/[0-9]+' -exec rm -rf {} +

          # Copy PWA files to root
          cp -r ../pwa/* .

          echo "Deployed PWA to gh-pages root"

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy PWA from master branch"

            # Fetch latest gh-pages and rebase before pushing, with retries to handle concurrent updates
            max_attempts=5
            attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Attempt $attempt of $max_attempts to rebase and push gh-pages..."

              # Fetch latest remote gh-pages (if it exists)
              git fetch origin gh-pages || true
              if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
                if ! git rebase origin/gh-pages; then
                  echo "Rebase failed, aborting and retrying..."
                  git rebase --abort || true
                  attempt=$((attempt + 1))
                  sleep 5
                  continue
                fi
              fi

              if git push origin gh-pages; then
                echo "Push to gh-pages succeeded."
                break
              else
                echo "Push to gh-pages failed, retrying..."
                attempt=$((attempt + 1))
                sleep 5
              fi
            done

            if [ "$attempt" -gt "$max_attempts" ]; then
              echo "Failed to push to gh-pages after $max_attempts attempts."
              exit 1
            fi
          fi
