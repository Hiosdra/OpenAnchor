name: Build Apps

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-android-debug:
    name: Build Android App (Debug)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Android
        uses: ./.github/actions/setup-android

      - name: Build Android app (debug)
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload Android APK (debug)
        uses: actions/upload-artifact@v7
        with:
          name: android-app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          archive: false

  build-android-release:
    name: Build Android App (Release)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Android
        uses: ./.github/actions/setup-android

      - name: Build Android app (release)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload Android APK (release)
        uses: actions/upload-artifact@v7
        with:
          name: android-app-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          archive: false

  test-android:
    name: Test Android App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Android
        uses: ./.github/actions/setup-android

      - name: Generate coverage report
        run: ./gradlew :app:jacocoTestReport --no-daemon --stacktrace

      - name: Verify coverage thresholds
        id: coverage-check
        run: ./gradlew :app:jacocoCoverageVerification --no-daemon
        continue-on-error: true

      - name: Report coverage threshold failure
        if: steps.coverage-check.outcome == 'failure'
        run: echo "::warning::Coverage thresholds not met. Check the coverage report for details."

      - name: Upload Android test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-test-results
          path: |
            android/app/build/test-results/testDebugUnitTest/*.xml
            android/app/build/reports/tests/testDebugUnitTest/
          retention-days: 30

      - name: Upload Android coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-coverage
          path: android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          retention-days: 30

      - name: Publish Android test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Android Unit Tests
          path: android/app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: true

  build-wear-debug:
    name: Build Wear OS App (Debug)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Android
        uses: ./.github/actions/setup-android

      - name: Build Wear OS app (debug)
        run: ./gradlew :wear:assembleDebug --no-daemon --stacktrace

      - name: Upload Wear OS APK (debug)
        uses: actions/upload-artifact@v7
        with:
          name: wear-app-debug
          path: android/wear/build/outputs/apk/debug/*.apk
          retention-days: 30
          archive: false

  build-wear-release:
    name: Build Wear OS App (Release)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Android
        uses: ./.github/actions/setup-android

      - name: Build Wear OS app (release)
        run: ./gradlew :wear:assembleRelease --no-daemon --stacktrace

      - name: Upload Wear OS APK (release)
        uses: actions/upload-artifact@v7
        with:
          name: wear-app-release
          path: android/wear/build/outputs/apk/release/*.apk
          retention-days: 30
          archive: false

  validate-pwa:
    name: Validate PWA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate PWA files exist
        run: |
          echo "Checking PWA files..."

          if [ ! -f "pwa/index.html" ]; then
            echo "Error: pwa/index.html not found"
            exit 1
          fi

          if [ ! -f "pwa/public/manifest.json" ]; then
            echo "Error: pwa/public/manifest.json not found"
            exit 1
          fi

          if [ ! -f "pwa/public/assets/icon-192x192.png" ]; then
            echo "Error: pwa/public/assets/icon-192x192.png not found"
            exit 1
          fi

          if [ ! -f "pwa/public/assets/icon-512x512.png" ]; then
            echo "Error: pwa/public/assets/icon-512x512.png not found"
            exit 1
          fi

          if [ ! -f "pwa/public/assets/icon.svg" ]; then
            echo "Error: pwa/public/assets/icon.svg not found"
            exit 1
          fi

          if [ ! -f "pwa/src/service-worker/sw.ts" ]; then
            echo "Error: pwa/src/service-worker/sw.ts not found"
            exit 1
          fi

          echo "All required PWA files exist ✓"

      - name: Validate manifest.json
        run: |
          echo "Validating manifest.json..."

          if ! command -v jq &> /dev/null; then
            echo "Installing jq..."
            sudo apt-get update && sudo apt-get install -y jq
          fi

          if ! jq empty pwa/public/manifest.json; then
            echo "Error: manifest.json is not valid JSON"
            exit 1
          fi

          echo "manifest.json is valid JSON ✓"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Validate service worker build source
        run: |
          echo "Validating service worker build source..."

          ESBUILD_VERSION=$(node -p "require('./pwa/package.json').devDependencies.esbuild")
          npx --yes --package "esbuild@${ESBUILD_VERSION}" esbuild pwa/src/service-worker/sw.ts \
            --bundle \
            --format=iife \
            --target=es2020 \
            --outfile=/tmp/openanchor-sw.js >/dev/null
          node --check /tmp/openanchor-sw.js
          rm -f /tmp/openanchor-sw.js

          echo "Service worker build source is valid ✓"

      - name: Validate index.html
        run: |
          echo "Checking index.html structure..."

          # Check if critical elements exist
          if ! grep -q "<html" pwa/index.html; then
            echo "Error: No <html> tag found"
            exit 1
          fi

          if ! grep -q "manifest.json" pwa/index.html; then
            echo "Error: No reference to manifest.json found"
            exit 1
          fi

          echo "index.html structure is valid ✓"

      - name: Upload PWA artifact
        uses: actions/upload-artifact@v7
        with:
          name: pwa
          path: pwa/
          retention-days: 30

  test-pwa:
    name: Test PWA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pwa

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PWA
        uses: ./.github/actions/setup-pwa

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: pwa-coverage
          path: pwa/coverage/coverage-summary.json
          retention-days: 30

      - name: Display coverage summary
        run: |
          echo "Test Coverage Summary:"
          echo "====================="
          if [ -f "coverage/coverage-summary.json" ]; then
            node -e "
              const coverage = require('./coverage/coverage-summary.json');
              const total = coverage.total;
              console.log('Lines:      ' + total.lines.pct + '%');
              console.log('Statements: ' + total.statements.pct + '%');
              console.log('Functions:  ' + total.functions.pct + '%');
              console.log('Branches:   ' + total.branches.pct + '%');
            "
          else
            echo "Coverage summary not found"
          fi

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-android, test-pwa]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download PWA coverage
        uses: actions/download-artifact@v8
        with:
          name: pwa-coverage
          path: pwa-coverage

      - name: Download Android coverage
        uses: actions/download-artifact@v8
        with:
          name: android-coverage
          path: android-coverage
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Generate coverage comment
        id: coverage
        run: |
          echo "## 📊 Test Coverage Report" > coverage-comment.md
          echo "" >> coverage-comment.md

          # PWA Coverage
          echo "### PWA Coverage" >> coverage-comment.md
          if [ -f "pwa-coverage/coverage-summary.json" ]; then
            node -e "
              const fs = require('fs');
              const coverage = require('./pwa-coverage/coverage-summary.json');
              const total = coverage.total;

              let output = '| Metric | Coverage |\n';
              output += '|--------|----------|\n';
              output += '| Lines | ' + total.lines.pct + '% (' + total.lines.covered + '/' + total.lines.total + ') |\n';
              output += '| Statements | ' + total.statements.pct + '% (' + total.statements.covered + '/' + total.statements.total + ') |\n';
              output += '| Functions | ' + total.functions.pct + '% (' + total.functions.covered + '/' + total.functions.total + ') |\n';
              output += '| Branches | ' + total.branches.pct + '% (' + total.branches.covered + '/' + total.branches.total + ') |\n';

              fs.appendFileSync('coverage-comment.md', output);
            "
          else
            echo "Coverage data not available" >> coverage-comment.md
          fi

          echo "" >> coverage-comment.md

          # Android Coverage
          echo "### Android Coverage" >> coverage-comment.md
          if [ -f "android-coverage/jacocoTestReport.xml" ]; then
            python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import os

          if os.path.exists('android-coverage/jacocoTestReport.xml'):
              tree = ET.parse('android-coverage/jacocoTestReport.xml')
              root = tree.getroot()

              # Parse only root-level counters (report totals)
              counters = {}
              for counter in root.findall("./counter"):
                  type_name = counter.get('type')
                  missed = int(counter.get('missed', 0))
                  covered = int(counter.get('covered', 0))
                  total = missed + covered
                  pct = (covered / total * 100) if total > 0 else 0
                  counters[type_name] = {'covered': covered, 'total': total, 'pct': round(pct, 2)}

              with open('coverage-comment.md', 'a') as f:
                  f.write('| Metric | Coverage |\n')
                  f.write('|--------|----------|\n')
                  if 'LINE' in counters:
                      c = counters['LINE']
                      f.write(f"| Lines | {c['pct']}% ({c['covered']}/{c['total']}) |\n")
                  if 'INSTRUCTION' in counters:
                      c = counters['INSTRUCTION']
                      f.write(f"| Instructions | {c['pct']}% ({c['covered']}/{c['total']}) |\n")
                  if 'METHOD' in counters:
                      c = counters['METHOD']
                      f.write(f"| Methods | {c['pct']}% ({c['covered']}/{c['total']}) |\n")
                  if 'BRANCH' in counters:
                      c = counters['BRANCH']
                      f.write(f"| Branches | {c['pct']}% ({c['covered']}/{c['total']}) |\n")
                  if 'CLASS' in counters:
                      c = counters['CLASS']
                      f.write(f"| Classes | {c['pct']}% ({c['covered']}/{c['total']}) |\n")
          else:
              with open('coverage-comment.md', 'a') as f:
                  f.write('Coverage data not available\n')
          EOF
          else
            echo "Coverage data not available" >> coverage-comment.md
          fi

          echo "" >> coverage-comment.md
          echo "_Coverage thresholds enforced: PWA ≥ 75% lines/statements/functions/branches (vitest), Android ≥ 90% lines (JaCoCo, after exclusions). Build fails if breached._" >> coverage-comment.md

      - name: Comment PR with coverage
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage-report
          path: coverage-comment.md

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-android-debug, build-android-release, test-android, build-wear-debug, build-wear-release, validate-pwa, test-pwa]
    if: always()

    steps:
      - name: Check build results
        run: |
          echo "Build Summary:"
          echo "=============="
          echo "Android App Build (Debug): ${{ needs.build-android-debug.result }}"
          echo "Android App Build (Release): ${{ needs.build-android-release.result }}"
          echo "Android App Tests: ${{ needs.test-android.result }}"
          echo "Wear OS App (Debug): ${{ needs.build-wear-debug.result }}"
          echo "Wear OS App (Release): ${{ needs.build-wear-release.result }}"
          echo "PWA Validation: ${{ needs.validate-pwa.result }}"
          echo "PWA Tests: ${{ needs.test-pwa.result }}"

          if [ "${{ needs.build-android-debug.result }}" != "success" ] || \
             [ "${{ needs.build-android-release.result }}" != "success" ] || \
             [ "${{ needs.test-android.result }}" != "success" ] || \
             [ "${{ needs.build-wear-debug.result }}" != "success" ] || \
             [ "${{ needs.build-wear-release.result }}" != "success" ] || \
             [ "${{ needs.validate-pwa.result }}" != "success" ] || \
             [ "${{ needs.test-pwa.result }}" != "success" ]; then
            echo ""
            echo "❌ One or more jobs failed"
            exit 1
          fi

          echo ""
          echo "✅ All jobs successful!"
