name: Build Apps

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android app (debug)
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Build Android app (release)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload Android APK (debug)
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Android APK (release)
        uses: actions/upload-artifact@v4
        with:
          name: android-app-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  build-wear:
    name: Build Wear OS App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Wear OS app (debug)
        run: ./gradlew :wear:assembleDebug --no-daemon --stacktrace

      - name: Build Wear OS app (release)
        run: ./gradlew :wear:assembleRelease --no-daemon --stacktrace

      - name: Upload Wear OS APK (debug)
        uses: actions/upload-artifact@v4
        with:
          name: wear-app-debug
          path: android/wear/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Wear OS APK (release)
        uses: actions/upload-artifact@v4
        with:
          name: wear-app-release
          path: android/wear/build/outputs/apk/release/*.apk
          retention-days: 30

  validate-pwa:
    name: Validate PWA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate PWA files exist
        run: |
          echo "Checking PWA files..."

          if [ ! -f "pwa/index.html" ]; then
            echo "Error: pwa/index.html not found"
            exit 1
          fi

          if [ ! -f "pwa/manifest.json" ]; then
            echo "Error: pwa/manifest.json not found"
            exit 1
          fi

          if [ ! -f "pwa/sw.js" ]; then
            echo "Error: pwa/sw.js not found"
            exit 1
          fi

          echo "All required PWA files exist ✓"

      - name: Validate manifest.json
        run: |
          echo "Validating manifest.json..."

          if ! command -v jq &> /dev/null; then
            echo "Installing jq..."
            sudo apt-get update && sudo apt-get install -y jq
          fi

          if ! jq empty pwa/manifest.json; then
            echo "Error: manifest.json is not valid JSON"
            exit 1
          fi

          echo "manifest.json is valid JSON ✓"

      - name: Validate service worker syntax
        run: |
          echo "Validating service worker JavaScript syntax..."

          if ! command -v node &> /dev/null; then
            echo "Node.js not found, installing..."
            sudo apt-get update && sudo apt-get install -y nodejs
          fi

          # Check for syntax errors
          node --check pwa/sw.js

          echo "Service worker syntax is valid ✓"

      - name: Validate index.html
        run: |
          echo "Checking index.html structure..."

          # Check if critical elements exist
          if ! grep -q "<html" pwa/index.html; then
            echo "Error: No <html> tag found"
            exit 1
          fi

          if ! grep -q "manifest.json" pwa/index.html; then
            echo "Error: No reference to manifest.json found"
            exit 1
          fi

          echo "index.html structure is valid ✓"

      - name: Upload PWA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa
          path: pwa/
          retention-days: 30

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-android, build-wear, validate-pwa]
    if: always()

    steps:
      - name: Check build results
        run: |
          echo "Build Summary:"
          echo "=============="
          echo "Android App: ${{ needs.build-android.result }}"
          echo "Wear OS App: ${{ needs.build-wear.result }}"
          echo "PWA Validation: ${{ needs.validate-pwa.result }}"

          if [ "${{ needs.build-android.result }}" != "success" ] || \
             [ "${{ needs.build-wear.result }}" != "success" ] || \
             [ "${{ needs.validate-pwa.result }}" != "success" ]; then
            echo ""
            echo "❌ One or more builds failed"
            exit 1
          fi

          echo ""
          echo "✅ All builds successful!"
