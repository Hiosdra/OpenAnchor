name: PWA E2E Tests

on:
  pull_request:
    paths:
      - 'pwa/**'
  push:
    branches:
      - master
      - main
    paths:
      - 'pwa/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: PWA Playwright Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    defaults:
      run:
        working-directory: ./pwa

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PWA
        uses: ./.github/actions/setup-pwa

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests with coverage
        id: e2e-tests
        continue-on-error: true
        run: npm run test:e2e:coverage -- --shard=${{ matrix.shard }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: pwa/e2e-results/
          retention-days: 30

      - name: Upload E2E raw coverage data
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pwa-e2e-raw-coverage-${{ strategy.job-index }}
          path: pwa/.nyc_output/e2e/
          retention-days: 30
          if-no-files-found: warn

      - name: Fail if E2E tests failed
        if: steps.e2e-tests.outcome == 'failure'
        run: exit 1

  e2e-report:
    name: E2E Coverage Report
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    defaults:
      run:
        working-directory: ./pwa

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PWA
        uses: ./.github/actions/setup-pwa

      - name: Download raw coverage from shard 0
        uses: actions/download-artifact@v8
        with:
          name: pwa-e2e-raw-coverage-0
          path: pwa/.nyc_output/e2e/
        continue-on-error: true

      - name: Download raw coverage from shard 1
        uses: actions/download-artifact@v8
        with:
          name: pwa-e2e-raw-coverage-1
          path: pwa/.nyc_output/e2e/
        continue-on-error: true

      - name: Generate E2E coverage report
        run: node scripts/generate-e2e-coverage-report.mjs

      - name: Generate E2E coverage comment
        run: npm run test:e2e:coverage:comment

      - name: Comment PR with E2E coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pwa-e2e-coverage
          path: pwa/e2e-coverage-comment.md
