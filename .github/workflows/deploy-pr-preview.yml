name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'pwa/**'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Checkout gh-pages branch
        id: checkout-ghpages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-branch
        continue-on-error: true

      - name: Initialize gh-pages if needed
        run: |
          if [ "${{ steps.checkout-ghpages.outcome }}" != "success" ]; then
            echo "gh-pages branch doesn't exist, creating it..."
            mkdir -p gh-pages-branch
            cd gh-pages-branch
            git init
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b gh-pages
            echo "# PR Previews" > README.md
            git add README.md
            git commit -m "Initialize gh-pages branch"

            # Set remote URL (works whether remote exists or not)
            if git remote get-url origin >/dev/null 2>&1; then
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            else
              git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            fi

            # If another workflow run created gh-pages concurrently, align to it instead of failing with a non-fast-forward push
            if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
              echo "Remote gh-pages branch already exists, fetching and aligning local branch..."
              git fetch origin gh-pages
              git reset --hard origin/gh-pages
            else
              echo "Remote gh-pages branch does not exist, creating it..."
              git push -u origin gh-pages
            fi
          fi

      - name: Deploy to PR subdirectory
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          TARGET_DIR="gh-pages-branch/${PR_NUMBER}"

          # Create or clean the PR subdirectory
          rm -rf "${TARGET_DIR}"
          mkdir -p "${TARGET_DIR}"

          # Copy PWA files to the PR subdirectory
          cp -r pwa/* "${TARGET_DIR}/"

          echo "Deployed PWA to ${TARGET_DIR}"

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy preview for PR #${{ github.event.pull_request.number }}"
            git push origin gh-pages
          fi

      - name: Comment PR with preview URL
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${prNumber}/`;

            const comment = [
              '<!-- pr-preview-bot-marker -->',
              '🚀 **PR Preview Deployed!**',
              '',
              `Preview this PR at: ${previewUrl}`,
              '',
              'The preview site will update automatically when you push new commits to this PR.'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- pr-preview-bot-marker -->')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }

  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout gh-pages branch
        id: checkout-gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
        continue-on-error: true

      - name: Remove PR subdirectory
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          # Check if gh-pages branch checkout succeeded
          if [ "${{ steps.checkout-gh-pages.outcome }}" != "success" ]; then
            echo "gh-pages branch doesn't exist, nothing to clean up"
            exit 0
          fi

          if [ -d "${PR_NUMBER}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git rm -rf "${PR_NUMBER}"
            git commit -m "Remove preview for closed PR #${PR_NUMBER}"
            git push origin gh-pages

            echo "Removed preview for PR #${PR_NUMBER}"
          else
            echo "No preview directory found for PR #${PR_NUMBER}"
          fi

      - name: Comment on closed PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;

            const comment = [
              '<!-- pr-preview-bot-marker -->',
              '🧹 **PR Preview Cleaned Up**',
              '',
              'The preview site for this PR has been removed since the PR is now closed.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });
