name: Android E2E Tests

on:
  pull_request:
    paths:
      - 'android/**'
  push:
    branches:
      - master
      - main
    paths:
      - 'android/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: Android Instrumented Tests (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1]
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Android
        uses: ./.github/actions/setup-android

      - name: Build APKs
        run: ./gradlew assembleDebug :app:assembleDebugAndroidTest --stacktrace

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-31-x86_64-google_apis

      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "AVD snapshot generated for caching."

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: google_apis
          working-directory: android
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb shell settings put global window_animation_scale 0.0
            adb shell settings put global transition_animation_scale 0.0
            adb shell settings put global animator_duration_scale 0.0
            ./gradlew :app:connectedDebugAndroidTest --stacktrace -Pandroid.testInstrumentationRunnerArguments.numShards=2 -Pandroid.testInstrumentationRunnerArguments.shardIndex=${{ matrix.shard }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-e2e-test-results-shard-${{ matrix.shard }}
          path: |
            android/app/build/reports/androidTests/
            android/app/build/outputs/androidTest-results/
          retention-days: 30

      - name: Upload E2E coverage data
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-e2e-coverage-ec-shard-${{ matrix.shard }}
          path: android/app/build/outputs/code_coverage/debugAndroidTest/connected/
          retention-days: 7
          if-no-files-found: warn

  e2e-report:
    name: E2E Coverage Report
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Android
        uses: ./.github/actions/setup-android

      - name: Download coverage data from shard 0
        uses: actions/download-artifact@v8
        with:
          name: android-e2e-coverage-ec-shard-0
          path: android/app/build/outputs/code_coverage/debugAndroidTest/connected/shard-0/
        continue-on-error: true

      - name: Download coverage data from shard 1
        uses: actions/download-artifact@v8
        with:
          name: android-e2e-coverage-ec-shard-1
          path: android/app/build/outputs/code_coverage/debugAndroidTest/connected/shard-1/
        continue-on-error: true

      - name: Generate E2E coverage report
        run: ./gradlew :app:assembleDebug :app:jacocoConnectedTestReport --no-daemon --stacktrace
        continue-on-error: true

      - name: Generate E2E coverage comment
        working-directory: ./android
        run: python3 scripts/generate-e2e-coverage-comment.py

      - name: Comment PR with E2E coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: android-e2e-coverage
          path: android/android-e2e-coverage-comment.md

      - name: Upload E2E coverage HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-e2e-coverage
          path: android/app/build/reports/jacoco/jacocoConnectedTestReport/html/
          retention-days: 30
          if-no-files-found: warn
