name: Setup PWA
description: Set up Node.js and install PWA dependencies

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: pwa/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: ./pwa
      run: npm ci
