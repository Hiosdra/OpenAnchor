name: 'Setup Android Environment'
description: 'Sets up the Android build environment with JDK and Gradle'

runs:
  using: 'composite'
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      shell: bash
      working-directory: android
      run: chmod +x gradlew
