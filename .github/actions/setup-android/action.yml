name: Setup Android
description: Set up JDK 17, Gradle cache, and gradlew permissions for Android builds

runs:
  using: composite
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      shell: bash
      working-directory: ./android
      run: chmod +x gradlew
