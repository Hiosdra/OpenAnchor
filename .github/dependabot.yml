version: 2
updates:
  # Android: Gradle dependencies with grouped updates
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      android-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      android-major-updates:
        patterns:
          - "*"
        update-types:
          - "major"
    labels:
      - "dependencies"
      - "android"
    open-pull-requests-limit: 5

  # Android: GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
