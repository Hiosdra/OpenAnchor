<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Deep blue background (matching main icon) -->
    <rect x="-4" y="-4" width="32" height="32" rx="6" fill="#0f172a" />

    <!-- Safe Zone Area glow -->
    <circle cx="12" cy="12" r="9.5" fill="#3b82f6" fill-opacity="0.15" />

    <!-- Alert Boundary ring (matching main icon style) -->
    <circle cx="12" cy="12" r="9.5" fill="none" stroke="#3b82f6" stroke-width="0.6" stroke-dasharray="1.5 1" />

    <!-- Clipboard / exam sheet -->
    <rect x="6.5" y="4" width="11" height="14.5" rx="1.5" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Clipboard top clip -->
    <rect x="9" y="2.5" width="6" height="3" rx="1" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Check mark line 1 -->
    <polyline points="8.5,9 9.5,10 11,8" fill="none" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Text line 1 -->
    <line x1="12.5" y1="9" x2="15.5" y2="9" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round" />

    <!-- Check mark line 2 -->
    <polyline points="8.5,12.5 9.5,13.5 11,11.5" fill="none" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Text line 2 -->
    <line x1="12.5" y1="12.5" x2="15.5" y2="12.5" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round" />

    <!-- Empty checkbox line 3 -->
    <rect x="8.5" y="15" width="2" height="2" rx="0.4" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.6" />
    <!-- Text line 3 -->
    <line x1="12.5" y1="16" x2="15.5" y2="16" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.6" />

    <!-- Pencil -->
    <g transform="translate(14.5, 14) rotate(35)">
        <rect x="-0.8" y="0" width="1.6" height="7" rx="0.3" fill="#facc15" />
        <polygon points="-0.8,7 0.8,7 0,8.5" fill="#facc15" />
        <polygon points="-0.4,7.5 0.4,7.5 0,8.5" fill="#0f172a" />
    </g>
</svg>
