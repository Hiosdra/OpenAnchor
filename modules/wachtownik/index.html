        /* Tooltip system */
        .tooltip-trigger {
            position: relative;
            display: inline-block;
        }

        .tooltip-content {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            z-index: 1000;
            background-color: #1e293b;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            transition: opacity 0.2s, visibility 0.2s;
            pointer-events: none;
        }

        .tooltip-content::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #1e293b transparent transparent transparent;
        }

        .tooltip-trigger:hover .tooltip-content,
        .tooltip-trigger:focus .tooltip-content {
            visibility: visible;
            opacity: 1;
        }

        [data-night-mode="true"] .tooltip-content {
            background-color: #450a0a;
            border: 1px solid #7f1d1d;
        }

        [data-night-mode="true"] .tooltip-content::after {
            border-color: #450a0a transparent transparent transparent;
        }

        // Helper function to get active crew (excludes cook and optionally captain)
        const getActiveCrew = (crew, captainParticipates) => {

            return role !== 'cook' && (captainParticipates || role !== 'captain');
          });

        // Algorytm rekomendacji systemu wachtowego
        const recommendWatchSystem = (crew, captainParticipates = true) => {
          const activeCrew = getActiveCrew(crew, captainParticipates);
          const crewSize = activeCrew.length;

          // Liczba oficerów i kapitanów (doświadczeni)
          const experiencedCrew = activeCrew.filter(c => {
            const role = (c.role || '').toLowerCase();
            return role === 'captain' || role === 'officer';
          }).length;

          // Ocena każdego szablonu
          const scores = Object.entries(WATCH_TEMPLATES).map(([key, template]) => {
            let score = 0;

            // 1. Czy załoga ma odpowiednią wielkość?
            if (crewSize >= template.minCrew && crewSize <= template.optimalCrew + 2) {
              score += 25;
              // Bonus jeśli blisko optymalnej wielkości
              const diff = Math.abs(crewSize - template.optimalCrew);
              score += Math.max(0, 15 - diff * 3);
            } else if (crewSize < template.minCrew) {
              score -= 20; // Kara za zbyt małą załogę
            }

            // 2. Czy wymagana liczba osób na wachtę jest możliwa do realizacji?
            const maxReqCrew = Math.max(...template.slots.map(s => s.reqCrew));
            if (maxReqCrew > crewSize) {
              score -= 30; // Duża kara jeśli niemożliwe
            } else if (maxReqCrew <= crewSize / 2) {
              score += 10; // Bonus za komfortową rotację
            }

            // 3. Dla małej załogi preferuj prostsze systemy
            if (crewSize <= 4) {
              const slotsCount = template.slots.length;
              if (slotsCount <= 4) score += 10;
              if (slotsCount >= 7) score -= 10;
            }

            // 4. Dla dużej załogi preferuj więcej wacht (lepsza rotacja)
            if (crewSize >= 8) {
              const slotsCount = template.slots.length;
              if (slotsCount >= 6) score += 10;
            }

            return { key, template, score };
          });

          scores.sort((a, b) => b.score - a.score);

          // Zwróć top 3 rekomendacje
          return scores.slice(0, 3).map(s => ({

        const generateRecommendationReason = (scoreObj, crewSize, experiencedCrew) => {
          const reasons = [];

          if (crewSize >= scoreObj.template.minCrew && crewSize <= scoreObj.template.optimalCrew + 2) {
            reasons.push(`Optymalna wielkość załogi (${crewSize} osób)`);
          }

          const slotsCount = scoreObj.template.slots.length;
          if (crewSize <= 4 && slotsCount <= 4) {
            reasons.push('Prosty system dla małej załogi');
          } else if (crewSize >= 8 && slotsCount >= 6) {
            reasons.push('Dobre rozłożenie obciążenia dla dużej załogi');
          }

          if (experiencedCrew >= crewSize * 0.4) {
            reasons.push('Doświadczona załoga');
          }

          return reasons.length > 0 ? reasons.join(', ') : 'Uniwersalny system';
        };

        // Dropdown component for grouping buttons
        const Dropdown = ({ label, icon, children, isNightMode, buttonClassName = '' }) => {
          const [isOpen, setIsOpen] = useState(false);
          const dropdownRef = useRef(null);
          const menuId = useRef(`dropdown-menu-${Math.random().toString(36).substr(2, 9)}`);

          useEffect(() => {
            const handleClickOutside = (event) => {
              if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                setIsOpen(false);
              }
            };

            const handleKeyDown = (event) => {
              if (event.key === 'Escape' && isOpen) {
                setIsOpen(false);
              }
            };

            if (isOpen) {
              document.addEventListener('mousedown', handleClickOutside);
              document.addEventListener('keydown', handleKeyDown);
              return () => {
                document.removeEventListener('mousedown', handleClickOutside);
                document.removeEventListener('keydown', handleKeyDown);
              };
            }
          }, [isOpen]);

          const closeDropdown = () => setIsOpen(false);

          return (
            <div className="relative" ref={dropdownRef}>
              <button
                onClick={() => setIsOpen(!isOpen)}
                className={`flex items-center space-x-2 px-3 py-2.5 min-h-[44px] rounded-lg transition border ${buttonClassName || (isNightMode ? 'border-red-800 hover:bg-red-950 text-red-500' : 'bg-sky-600 border-sky-500 hover:bg-sky-500 text-white')}`}
                aria-haspopup="menu"
                aria-expanded={isOpen}
                aria-controls={menuId.current}
                aria-label={label}
              >
                {icon && <Icon name={icon} className="w-5 h-5" aria-hidden="true" />}
                {label && <span className="hidden sm:inline">{label}</span>}
                <Icon name="ChevronDown" className="w-4 h-4" aria-hidden="true" />
              </button>
              {isOpen && (
                <div
                  id={menuId.current}
                  role="menu"
                  className={`absolute right-0 mt-2 w-56 rounded-lg shadow-lg z-50 border ${isNightMode ? 'bg-zinc-900 border-red-900' : 'bg-white border-slate-200'}`}
                >
                  <div className="py-1">
                    {React.Children.map(children, child =>
                      React.cloneElement(child, { closeDropdown })
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        };

        // Dropdown item component
        const DropdownItem = ({ onClick, icon, label, disabled = false, isNightMode, closeDropdown }) => {
          const handleClick = () => {
            if (!disabled && onClick) {
              onClick();
              if (closeDropdown) closeDropdown();
            }
          };

          return (
            <button
              onClick={handleClick}
              disabled={disabled}
              role="menuitem"
              className={`w-full flex items-center space-x-2 px-4 py-2.5 text-left transition ${
                disabled
                  ? (isNightMode ? 'opacity-40 cursor-not-allowed text-red-700' : 'opacity-40 cursor-not-allowed text-slate-400')
                  : (isNightMode ? 'hover:bg-red-950 text-red-500' : 'hover:bg-slate-100 text-slate-800')
              }`}
            >
              <Icon name={icon} className="w-5 h-5" aria-hidden="true" />
              <span>{label}</span>
            </button>
          );
        };

        function App() {
          const [crew, setCrew] = useState(defaultCrew);
          const [newCrewName, setNewCrewName] = useState('');
          const [newCrewRole, setNewCrewRole] = useState('sailor');
          const [slots, setSlots] = useState(defaultSlots);
          const [days, setDays] = useState(7);
          const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
          const [schedule, setSchedule] = useState([]);
          const [isGenerated, setIsGenerated] = useState(false);
          const [captainParticipates, setCaptainParticipates] = useState(true);

          const [currentTime, setCurrentTime] = useState(new Date());
          const [copyStatus, setCopyStatus] = useState('');
          const [toastType, setToastType] = useState('success'); // 'success' or 'error'
          const [isLoaded, setIsLoaded] = useState(false);
          const [showQRModal, setShowQRModal] = useState(false);
          const [qrError, setQrError] = useState('');
          const qrCodeRef = useRef(null);

          const [isNightMode, setIsNightMode] = useState(false);
          const [notificationsEnabled, setNotificationsEnabled] = useState(false);
          const notifiedSlots = useRef(new Set());
          const [draggedItem, setDraggedItem] = useState(null);
          const [isReadOnly, setIsReadOnly] = useState(false);

          const [activeTab, setActiveTab] = useState('setup');

          // Locale detection for internationalization
          const [userLocale, setUserLocale] = useState(() => {
            // Check localStorage first
            const saved = localStorage.getItem('wachtownik_language');
            if (saved) return saved;
            // Detect browser locale, fallback to 'pl-PL'
            const browserLocale = navigator.language || navigator.userLanguage || 'pl-PL';
            // Support pl-PL and en-US primarily
            if (browserLocale.startsWith('en')) return 'en-US';
            return 'pl-PL';
          });

          // Save language preference
          useEffect(() => {
            localStorage.setItem('wachtownik_language', userLocale);
          }, [userLocale]);

          // Toggle language function
          const toggleLanguage = () => {
            setUserLocale(prev => prev === 'pl-PL' ? 'en-US' : 'pl-PL');
          };

          // Undo/Redo history management
          const [history, setHistory] = useState([]);
          const [historyIndex, setHistoryIndex] = useState(-1);
          const isUndoRedoAction = useRef(false);
          const MAX_HISTORY_SIZE = 20;

          // --- Inicjalizacja i Autozapis ---
          useEffect(() => {
            const loadState = () => {
              const hash = window.location.hash;
              let stateToLoad = null;
              let readOnlyMode = false;

              if (hash.startsWith('#share=')) {
                try {
                  const encoded = hash.replace('#share=', '');

                  // Check if compressed format (starts with 'c:')
                  if (!encoded.startsWith('c:')) {
                    console.error("Nieprawidłowy format linku - oczekiwano skompresowanego formatu z prefiksem 'c:'");
                    return;
                  }

                  // Ensure LZString library is available
                  if (typeof window.LZString === 'undefined' || !window.LZString || typeof window.LZString.decompressFromEncodedURIComponent !== 'function') {
                    console.error("Biblioteka LZString nie jest dostępna - nie można zdekompresować danych z linku współdzielenia");
                    return;
                  }

                  const compressed = encoded.substring(2); // Remove 'c:' prefix
                  const decompressed = window.LZString.decompressFromEncodedURIComponent(compressed);

                  if (decompressed == null) {
                    console.error("Nieudana dekompresja danych z linku współdzielenia");
                    return;
                  }

                  stateToLoad = JSON.parse(decompressed);
                  window.history.replaceState(null, '', window.location.pathname);
                } catch (e) { console.error("Błąd odczytu linku", e); }
              } else if (hash.startsWith('#share-readonly=')) {
                try {
                  const encoded = hash.replace('#share-readonly=', '');
                  stateToLoad = JSON.parse(decodeURIComponent(atob(encoded)));
                  readOnlyMode = true;
                  setIsReadOnly(true);
                  window.history.replaceState(null, '', window.location.pathname);
                } catch (e) { console.error("Błąd odczytu linku", e); }
              } else {
                const saved = localStorage.getItem('sailingSchedulePro');
                if (saved) {
                  try { stateToLoad = JSON.parse(saved); } catch(e) { console.error("Błąd odczytu storage", e); }
                }
              }

              if (stateToLoad) {
                if (stateToLoad.crew && typeof stateToLoad.crew[0] === 'string') {
                  setCrew(stateToLoad.crew.map((name, i) => ({ id: `old_${i}`, name, role: 'sailor' })));
                  setIsGenerated(false);
                } else {
                  if (stateToLoad.crew) setCrew(stateToLoad.crew);
                  if (stateToLoad.schedule) setSchedule(stateToLoad.schedule);
                  if (stateToLoad.isGenerated !== undefined) {
                    setIsGenerated(stateToLoad.isGenerated);
                    if (stateToLoad.isGenerated) setActiveTab('schedule');
                  }
                }
                if (stateToLoad.slots) setSlots(stateToLoad.slots);
                if (stateToLoad.days) setDays(stateToLoad.days);
                if (stateToLoad.startDate) setStartDate(stateToLoad.startDate);
                if (stateToLoad.isNightMode) setIsNightMode(stateToLoad.isNightMode);
                if (stateToLoad.captainParticipates !== undefined) setCaptainParticipates(stateToLoad.captainParticipates);

                // If read-only mode, ensure we don't end up on the non-existent "setup" tab
                if (readOnlyMode) {
                  if (stateToLoad.isGenerated) {
                    setActiveTab('schedule');
                  } else {
                    // Fallback to a safe default tab that is available in read-only mode
                    setActiveTab('crew');
                  }
                }
              }
              setIsLoaded(true);
            };

            loadState();
            const timer = setInterval(() => setCurrentTime(new Date()), 60000);
            return () => clearInterval(timer);
          }, []);

          useEffect(() => {
            if (isLoaded && !isReadOnly) {
              const stateToSave = { crew, slots, days, startDate, schedule, isGenerated, isNightMode, captainParticipates };
              localStorage.setItem('sailingSchedulePro', JSON.stringify(stateToSave));
            }

            if (isNightMode) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }, [crew, slots, days, startDate, schedule, isGenerated, isLoaded, isNightMode, captainParticipates]);

          // --- History tracking for Undo/Redo ---
          useEffect(() => {
            // Skip if not loaded yet, in read-only mode, or during undo/redo action
            if (!isLoaded || isReadOnly || isUndoRedoAction.current) {
              return;
            }

            // Create snapshot of current state
            const currentState = {
              crew: JSON.parse(JSON.stringify(crew)),
              slots: JSON.parse(JSON.stringify(slots)),
              schedule: JSON.parse(JSON.stringify(schedule)),
            };

            // Check if state actually changed (compare with last history entry)
            const lastState = historyIndex >= 0 ? history[historyIndex] : null;
            const stateChanged = !lastState ||
              JSON.stringify(lastState.crew) !== JSON.stringify(currentState.crew) ||
              JSON.stringify(lastState.slots) !== JSON.stringify(currentState.slots) ||
              JSON.stringify(lastState.schedule) !== JSON.stringify(currentState.schedule);

            if (stateChanged) {
              // Remove any "future" history if we're not at the end
              const newHistory = history.slice(0, historyIndex + 1);

              // Add new state
              newHistory.push(currentState);

              // Limit history size
              if (newHistory.length > MAX_HISTORY_SIZE) {
                newHistory.shift();
                setHistory(newHistory);
                setHistoryIndex(newHistory.length - 1);
              } else {
                setHistory(newHistory);
                setHistoryIndex(newHistory.length - 1);
              }
            }
          }, [crew, slots, schedule, isLoaded, isReadOnly]);

          // Undo function
          const undo = () => {
            if (historyIndex > 0) {
              isUndoRedoAction.current = true;
              const previousState = history[historyIndex - 1];

              setCrew(JSON.parse(JSON.stringify(previousState.crew)));
              setSlots(JSON.parse(JSON.stringify(previousState.slots)));
              setSchedule(JSON.parse(JSON.stringify(previousState.schedule)));
              setIsGenerated(previousState.schedule && previousState.schedule.length > 0);

              setHistoryIndex(historyIndex - 1);
            }
          };

          // Redo function
          const redo = () => {
            if (historyIndex < history.length - 1) {
              isUndoRedoAction.current = true;
              const nextState = history[historyIndex + 1];

              setCrew(JSON.parse(JSON.stringify(nextState.crew)));
              setSlots(JSON.parse(JSON.stringify(nextState.slots)));
              setSchedule(JSON.parse(JSON.stringify(nextState.schedule)));
              setIsGenerated(nextState.schedule && nextState.schedule.length > 0);

              setHistoryIndex(historyIndex + 1);
            }
          };

          // Reset undo/redo flag after state updates complete
          useEffect(() => {
            if (isUndoRedoAction.current) {
              isUndoRedoAction.current = false;
            }
          }, [crew, slots, schedule]);

          // Check if undo/redo are available
          const canUndo = historyIndex > 0;
          const canRedo = historyIndex < history.length - 1;

          // Memoized active crew calculation (performance optimization)
          const activeCrew = useMemo(() => {
            return getActiveCrew(crew, captainParticipates);
          }, [crew, captainParticipates]);

          // Memoized recommendations calculation (performance optimization)
          const recommendations = useMemo(() => {
            if (activeCrew.length > 0) {
              return recommendWatchSystem(crew, captainParticipates);
            }
            return [];
          }, [crew, captainParticipates, activeCrew]);

          const dashboardData = useMemo(() => {
            if (!isGenerated || schedule.length === 0) return null;

            const baseDate = new Date(startDate);
            baseDate.setHours(0, 0, 0, 0);
            const allSlotsAbsolute = [];

            schedule.forEach((dayObj, dayIdx) => {
              dayObj.slots.forEach(slot => {
                const startParts = slot.start.split(':').map(Number);
                let endParts = slot.end.split(':').map(Number);

                const slotStart = new Date(baseDate);
                slotStart.setDate(slotStart.getDate() + dayIdx);
                slotStart.setHours(startParts[0], startParts[1], 0, 0);

                const slotEnd = new Date(baseDate);
                slotEnd.setDate(slotEnd.getDate() + dayIdx);
                if (endParts[0] === 24) { endParts[0] = 0; slotEnd.setDate(slotEnd.getDate() + 1); }
                else if (endParts[0] < startParts[0]) { slotEnd.setDate(slotEnd.getDate() + 1); }
                slotEnd.setHours(endParts[0], endParts[1], 0, 0);

                allSlotsAbsolute.push({ ...slot, dayNumber: dayObj.day, absoluteStart: slotStart, absoluteEnd: slotEnd });
              });
            });

            allSlotsAbsolute.sort((a, b) => a.absoluteStart - b.absoluteStart);

            const tripStart = allSlotsAbsolute[0]?.absoluteStart;
            const tripEnd = allSlotsAbsolute[allSlotsAbsolute.length - 1]?.absoluteEnd;

            let currentSlot = null, nextSlot = null, status = 'W TRAKCIE', progress = 0;

            if (currentTime < tripStart) {
              status = 'PRZED REJSEM'; nextSlot = allSlotsAbsolute[0];
            } else if (currentTime >= tripEnd) {
              status = 'ZAKOŃCZONY'; progress = 100;
            } else {
              const cIdx = allSlotsAbsolute.findIndex(s => currentTime >= s.absoluteStart && currentTime < s.absoluteEnd);
              if (cIdx !== -1) {
                currentSlot = allSlotsAbsolute[cIdx]; nextSlot = allSlotsAbsolute[cIdx + 1] || null;
              } else {
                nextSlot = allSlotsAbsolute.find(s => s.absoluteStart > currentTime) || null;
              }
              progress = Math.max(0, Math.min(100, ((currentTime - tripStart) / (tripEnd - tripStart)) * 100));
            }

            return { currentSlot, nextSlot, status, progress, allSlotsAbsolute };
          }, [schedule, startDate, isGenerated, currentTime]);

          useEffect(() => {
            if (!notificationsEnabled || !dashboardData?.nextSlot) return;
            const msToNext = dashboardData.nextSlot.absoluteStart - currentTime;

            if (msToNext > 0 && msToNext <= 15 * 60000 && !notifiedSlots.current.has(dashboardData.nextSlot.id)) {
              if (Notification.permission === 'granted') {
                new Notification("Morski Grafik: Zmiana wachty!", {
                  body: `Przygotuj się na wachtę za 15 minut (${dashboardData.nextSlot.start} - ${dashboardData.nextSlot.end}).`,
                  icon: '/favicon.ico'
                });
                notifiedSlots.current.add(dashboardData.nextSlot.id);
              }
            }
          }, [currentTime, dashboardData, notificationsEnabled]);

          const toggleNotifications = async () => {
            if (!notificationsEnabled) {
              if ('Notification' in window) {
                const perm = await Notification.requestPermission();
                if (perm === 'granted') setNotificationsEnabled(true);
                else alert('Musisz zezwolić na powiadomienia w przeglądarce.');
              }
            } else {
              setNotificationsEnabled(false);
            }
          };

          // Keyboard shortcuts
          useEffect(() => {
            const handleKeyboard = (e) => {
              // Ctrl+Z - Undo
              if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
                e.preventDefault();
                if (!isReadOnly && canUndo) {
                  undo();
                }
              }
              // Ctrl+Y or Ctrl+Shift+Z - Redo
              if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
                e.preventDefault();
                if (!isReadOnly && canRedo) {
                  redo();
                }
              }
              // Ctrl+G - Generate schedule
              if ((e.ctrlKey || e.metaKey) && e.key === 'g') {
                e.preventDefault();
                if (activeTab === 'setup') {
                  generateSchedule();
                }
              }
              // Ctrl+P - Print
              if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                e.preventDefault();
                handlePrint();
              }
              // Escape - Close modal
              if (e.key === 'Escape' || e.key === 'Esc') {
                if (showQRModal) {
                  setShowQRModal(false);
                }
              }
              // Tab navigation helper - cycle through interactive elements
              // This is handled by browser natively, but we ensure no tab traps
            };

            window.addEventListener('keydown', handleKeyboard);
            return () => window.removeEventListener('keydown', handleKeyboard);
          }, [activeTab, crew, slots, days, startDate, schedule, isGenerated, isNightMode, canUndo, canRedo, isReadOnly, showQRModal]);

          const addCrew = () => {
            if (newCrewName.trim() && crew.length < 15) {
              setCrew([...crew, { id: Math.random().toString(36).substr(2,9), name: newCrewName.trim(), role: newCrewRole }]);
              setNewCrewName('');
            }
          };

          const removeCrew = (id) => {
            if (crew.length > 3) setCrew(crew.filter(c => c.id !== id));
            else alert('Minimalna liczba załogi to 3 osoby.');
          };


          const addSlot = () => setSlots([...slots, { id: Math.random().toString(36).substr(2, 9), start: '12:00', end: '16:00', reqCrew: 1 }]);
          const removeSlot = (id) => setSlots(slots.filter(s => s.id !== id));

          const validateSlotTime = (id, field, value) => {
            const slot = slots.find(s => s.id === id);
            if (!slot) return true;

            const newSlot = { ...slot, [field]: value };

            // Check if end time is after start time
            if (newSlot.start && newSlot.end) {
              const startMinutes = parseInt(newSlot.start.split(':')[0]) * 60 + parseInt(newSlot.start.split(':')[1]);
              const endMinutes = newSlot.end === '24:00' ? 1440 : parseInt(newSlot.end.split(':')[0]) * 60 + parseInt(newSlot.end.split(':')[1]);

              if (endMinutes <= startMinutes && newSlot.end !== '24:00') {
                alert(t('msg.endAfterStart', userLocale));
                return false;
              }

              // Check for overlapping watches
              const otherSlots = slots.filter(s => s.id !== id);
              for (const otherSlot of otherSlots) {
                const otherStartMinutes = parseInt(otherSlot.start.split(':')[0]) * 60 + parseInt(otherSlot.start.split(':')[1]);
                const otherEndMinutes = otherSlot.end === '24:00' ? 1440 : parseInt(otherSlot.end.split(':')[0]) * 60 + parseInt(otherSlot.end.split(':')[1]);

                // Check if there's an overlap
                if (startMinutes < otherEndMinutes && endMinutes > otherStartMinutes) {
                  alert(`${t('msg.watchOverlap', userLocale)} (${otherSlot.start} - ${otherSlot.end})`);
                  return false;
                }
              }
            }

            return true;
          };

          const updateSlot = (id, field, value) => {
            if (field === 'start' || field === 'end') {
              if (!validateSlotTime(id, field, value)) return;
            }
            setSlots(slots.map(s => s.id === id ? { ...s, [field]: value } : s));
          };

          const applyDogWatches = () => {
            const dogWatchSlot = slots.find(s => s.start === '16:00' && s.end === '20:00');

            if (!dogWatchSlot) {
              // Show error toast
              setToastType('error');
              setCopyStatus(t('msg.dogWatchesNotApplicable', userLocale));
              setTimeout(() => {
                setCopyStatus('');
                setToastType('success');
              }, 3000);
              return;
            }

            const newSlots = slots.flatMap(s => {
              if (s.start === '16:00' && s.end === '20:00') {
                return [
                  { id: Math.random().toString(), start: '16:00', end: '18:00', reqCrew: s.reqCrew },
                  { id: Math.random().toString(), start: '18:00', end: '20:00', reqCrew: s.reqCrew }
                ];
              }
              return s;
            });
            setSlots(newSlots);

            // Show success toast
            setToastType('success');
            setCopyStatus(t('msg.dogWatchesApplied', userLocale));
            setTimeout(() => {
              setCopyStatus('');
              setToastType('success');
            }, 3000);
          };

          const applyTemplate = (templateKey) => {
            const template = WATCH_TEMPLATES[templateKey];
            if (template) {
              const newSlots = template.slots.map((slot, index) => ({
                id: Math.random().toString(36).substr(2, 9),
                ...slot
              }));
              setSlots(newSlots);
              setIsGenerated(false);

              // Scroll to slots table for visual feedback
              requestAnimationFrame(() => {
                const slotsSection = document.getElementById('slots-configuration');
                if (slotsSection) {
                  const prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                  slotsSection.scrollIntoView({ behavior: prefersReducedMotion ? 'auto' : 'smooth', block: 'nearest' });
                }
              });
            }
          };

          // Calculate 24-hour coverage from slots
          const calculateCoverage = () => {
            if (slots.length === 0) return { totalMinutes: 0, gaps: [], hasFull24h: false };

            // Create a 1440-minute array (24 hours * 60 minutes)
            const coverage = new Array(1440).fill(false);

            slots.forEach(slot => {
              const startMinutes = parseInt(slot.start.split(':')[0]) * 60 + parseInt(slot.start.split(':')[1]);
              const endMinutes = slot.end === '24:00' ? 1440 : parseInt(slot.end.split(':')[0]) * 60 + parseInt(slot.end.split(':')[1]);

              // Mark covered minutes
              for (let i = startMinutes; i < endMinutes; i++) {
                coverage[i] = true;
              }
            });

            // Calculate total covered minutes
            const totalMinutes = coverage.filter(Boolean).length;

            // Find gaps
            const gaps = [];
            let gapStart = null;
            for (let i = 0; i < 1440; i++) {
              if (!coverage[i] && gapStart === null) {
                gapStart = i;
              } else if (coverage[i] && gapStart !== null) {
                gaps.push({
                  start: `${Math.floor(gapStart / 60).toString().padStart(2, '0')}:${(gapStart % 60).toString().padStart(2, '0')}`,
                  end: `${Math.floor(i / 60).toString().padStart(2, '0')}:${(i % 60).toString().padStart(2, '0')}`,
                  minutes: i - gapStart
                });
                gapStart = null;
              }
            }
            if (gapStart !== null) {
              gaps.push({
                start: `${Math.floor(gapStart / 60).toString().padStart(2, '0')}:${(gapStart % 60).toString().padStart(2, '0')}`,
                end: '24:00',
                minutes: 1440 - gapStart
              });
            }

            return { totalMinutes, gaps, hasFull24h: totalMinutes === 1440 };
          };

          const generateSchedule = () => {
            const activeCrew = getActiveCrew(crew, captainParticipates);
            if (activeCrew.length === 0) return alert('Brak załogi do wacht nawigacyjnych!');

            // Ensure we have enough active crew to satisfy the largest required crew per slot
            const maxReqCrew = slots.reduce((max, slot) => Math.max(max, slot.reqCrew || 0), 0);
            if (activeCrew.length < maxReqCrew) {
              return alert('Za mało członków załogi do obsadzenia wacht: wymagane minimum ' + maxReqCrew + ', dostępnych ' + activeCrew.length + '.');
            }

            // Use optimized algorithm for small crews
            const isSmallCrew = activeCrew.length <= 4;
            const newSchedule = isSmallCrew
              ? generateSmallCrewSchedule(activeCrew, slots, days)
              : generateStandardSchedule(activeCrew, slots, days);

            setSchedule(newSchedule);
            setIsGenerated(true);
            setActiveTab('schedule');

            // Detect conflicts after generating schedule
            detectScheduleConflicts(newSchedule, slots);
          };

          // Standard schedule generation (round-robin)
          const generateStandardSchedule = (activeCrew, slots, days) => {
            let currentCrewIndex = 0;
            const newSchedule = [];
            const sortedSlots = [...slots].sort((a, b) => a.start.localeCompare(b.start));

            for (let day = 1; day <= days; day++) {
              const daySlots = [];
              sortedSlots.forEach(slot => {
                const assigned = [];
                for (let i = 0; i < slot.reqCrew; i++) {
                  assigned.push(activeCrew[currentCrewIndex]);
                  currentCrewIndex = (currentCrewIndex + 1) % activeCrew.length;
                }
                daySlots.push({ ...slot, assigned });
              });
              newSchedule.push({ day, slots: daySlots });
            }

            return newSchedule;
          };

          // Optimized schedule generation for small crews (3-4 people)
          const generateSmallCrewSchedule = (activeCrew, slots, days) => {
            const newSchedule = [];
            const sortedSlots = [...slots].sort((a, b) => a.start.localeCompare(b.start));

            // Track when each crew member last worked
            const crewLastWorked = activeCrew.map((person, index) => ({
              person,
              lastSlotIndex: -1,
              consecutiveWatches: 0,
              nightWatchesInRow: 0
            }));

            // Helper to check if a slot is during night hours
            const isNightSlot = (slot) => {
              const hour = parseInt(slot.start.split(':')[0]);
              return hour >= 0 && hour < 6;
            };

            // Helper to find the best crew member for a slot
            const findBestCrewMember = (slotIndex, assignedInSlot) => {
              // Calculate scores for each available crew member
              const scores = crewLastWorked
                .filter(c => !assignedInSlot.some(a => a.id === c.person.id))
                .map(crewMember => {
                  let score = 0;

                  // Prefer crew members who haven't worked recently
                  const slotsSinceLastWork = slotIndex - crewMember.lastSlotIndex;
                  score += slotsSinceLastWork * 10;

                  // Avoid consecutive watches
                  if (crewMember.consecutiveWatches > 0) {
                    score -= crewMember.consecutiveWatches * 20;
                  }

                  // Distribute night watches evenly
                  if (isNightSlot(sortedSlots[slotIndex % sortedSlots.length])) {
                    score -= crewMember.nightWatchesInRow * 15;
                  }

                  return { crewMember, score };
                });

              // Sort by score (highest first) and return the best candidate
              scores.sort((a, b) => b.score - a.score);
              return scores[0]?.crewMember;
            };

            // Generate schedule with optimization
            for (let day = 1; day <= days; day++) {
              const daySlots = [];

              sortedSlots.forEach((slot, slotIndexInDay) => {
                const globalSlotIndex = (day - 1) * sortedSlots.length + slotIndexInDay;
                const assigned = [];

                for (let i = 0; i < slot.reqCrew; i++) {
                  const bestCrew = findBestCrewMember(globalSlotIndex, assigned);

                  if (bestCrew) {
                    assigned.push(bestCrew.person);

                    // Update tracking
                    bestCrew.lastSlotIndex = globalSlotIndex;
                    bestCrew.consecutiveWatches++;

                    if (isNightSlot(slot)) {
                      bestCrew.nightWatchesInRow++;
                    } else {
                      bestCrew.nightWatchesInRow = 0;
                    }

                    // Reset consecutive watches counter for other crew members
                    crewLastWorked.forEach(c => {
                      if (c.person.id !== bestCrew.person.id && c.lastSlotIndex < globalSlotIndex - sortedSlots.length) {
                        c.consecutiveWatches = 0;
                      }
                    });
                  } else {
                    // Fallback: use round-robin if no optimal candidate found
                    const fallbackIndex = (globalSlotIndex + i) % activeCrew.length;
                    assigned.push(activeCrew[fallbackIndex]);
                  }
                }

                daySlots.push({ ...slot, assigned });
              });

              newSchedule.push({ day, slots: daySlots });
            }

            return newSchedule;
          };

          // Detect and warn about schedule conflicts
          const detectScheduleConflicts = (scheduleData, sortedSlots) => {
            const conflicts = [];
            const crewWatchHistory = {};

            // Helper function to check if a time is during night hours (00:00-06:00)
            const isNightWatch = (startTime) => {
              const hour = parseInt(startTime.split(':')[0]);
              return hour >= 0 && hour < 6;
            };

            // Helper function to calculate rest hours between watches
            const calculateRestHours = (slot1EndTime, slot2StartTime) => {
              const [h1, m1] = slot1EndTime.split(':').map(Number);
              const [h2, m2] = slot2StartTime.split(':').map(Number);

              let end1 = h1 * 60 + m1;
              let start2 = h2 * 60 + m2;

              // Handle day boundary
              if (start2 < end1) {
                start2 += 24 * 60;
              }

              return (start2 - end1) / 60;
            };

            // Analyze each crew member's schedule
            scheduleData.forEach((daySchedule, dayIndex) => {
              daySchedule.slots.forEach((slot, slotIndex) => {
                slot.assigned.forEach(person => {
                  if (!crewWatchHistory[person.id]) {
                    crewWatchHistory[person.id] = {
                      name: person.name,
                      consecutiveNightWatches: 0,
                      lastWatch: null,
                      nightWatchCount: 0,
                      totalWatches: 0
                    };
                  }

                  const history = crewWatchHistory[person.id];
                  history.totalWatches++;

                  // Check for night watch
                  if (isNightWatch(slot.start)) {
                    history.nightWatchCount++;
                    history.consecutiveNightWatches++;

                    // Check for too many consecutive night watches (more than 3)
                    if (history.consecutiveNightWatches > 3) {
                      conflicts.push({
                        type: 'consecutive_night',
                        person: person.name,
                        day: daySchedule.day,
                        count: history.consecutiveNightWatches,
                        message: `${person.name} ma ${history.consecutiveNightWatches} nocne wachty pod rząd (max zalecane: 3)`
                      });
                    }
                  } else {
                    history.consecutiveNightWatches = 0;
                  }

                  // Check rest time between watches
                  if (history.lastWatch) {
                    const restHours = calculateRestHours(
                      history.lastWatch.end,
                      slot.start
                    );

                    // Warn if less than 6 hours rest (maritime standard)
                    if (restHours < 6 && restHours >= 0) {
                      conflicts.push({
                        type: 'insufficient_rest',
                        person: person.name,
                        day: daySchedule.day,
                        restHours: restHours.toFixed(1),
                        message: `${person.name} ma tylko ${restHours.toFixed(1)}h odpoczynku między wachtami (min zalecane: 6h)`
                      });
                    }
                  }

                  history.lastWatch = {
                    day: daySchedule.day,
                    start: slot.start,
                    end: slot.end
                  };
                });
              });
            });

            // Check for uneven distribution of night watches
            const crewMembers = Object.values(crewWatchHistory);
            if (crewMembers.length > 0) {
              const avgNightWatches = crewMembers.reduce((sum, c) => sum + c.nightWatchCount, 0) / crewMembers.length;

              crewMembers.forEach(member => {
                const difference = Math.abs(member.nightWatchCount - avgNightWatches);
                // Warn if difference is more than 30% of average
                if (difference > avgNightWatches * 0.3 && avgNightWatches > 0) {
                  conflicts.push({
                    type: 'uneven_distribution',
                    person: member.name,
                    nightWatchCount: member.nightWatchCount,
                    average: avgNightWatches.toFixed(1),
                    message: `${member.name} ma nierówny rozkład nocnych wacht: ${member.nightWatchCount} (średnia: ${avgNightWatches.toFixed(1)})`
                  });
                }
              });
            }

            // Display conflicts if any
            if (conflicts.length > 0) {
              const uniqueConflicts = conflicts.filter((conflict, index, self) =>
                index === self.findIndex(c => c.message === conflict.message)
              );

              console.warn('Schedule conflicts detected:', uniqueConflicts);
            }
          };

          const handleDragStart = (e, dayIdx, slotIdx, pIdx) => {
            setDraggedItem({ dayIdx, slotIdx, pIdx });
            e.dataTransfer.effectAllowed = 'move';
          };

          const handleDrop = (e, targetDayIdx, targetSlotIdx, targetPIdx) => {
            e.preventDefault();
            if (!draggedItem) return;

            const { dayIdx: sDay, slotIdx: sSlot, pIdx: sPIdx } = draggedItem;
            const newSchedule = [...schedule];

            const personA = newSchedule[sDay].slots[sSlot].assigned[sPIdx];
            const personB = newSchedule[targetDayIdx].slots[targetSlotIdx].assigned[targetPIdx];

            newSchedule[sDay].slots[sSlot].assigned[sPIdx] = personB;
            newSchedule[targetDayIdx].slots[targetSlotIdx].assigned[targetPIdx] = personA;

            setSchedule(newSchedule);
            setDraggedItem(null);
          };

          const handleDragOver = (e) => e.preventDefault();

          const crewStats = useMemo(() => {
            if (!isGenerated || !dashboardData) return [];

            return crew.map(c => {
              let totalMinutes = 0;
              let hardWatches = 0;

              dashboardData.allSlotsAbsolute.forEach(slot => {
                if (slot.assigned.some(p => p.id === c.id)) {
                  const duration = (slot.absoluteEnd - slot.absoluteStart) / 60000;
                  totalMinutes += duration;

                  const startHour = slot.absoluteStart.getHours();
                  if (startHour >= 0 && startHour <= 5) hardWatches++;
                }
              });
              return { ...c, totalHours: (totalMinutes / 60).toFixed(1), hardWatches };
            });
          }, [schedule, crew, dashboardData, isGenerated]);

          const downloadICS = (person) => {
            if (!dashboardData) return;

            let ics = "BEGIN:VCALENDAR\\nVERSION:2.0\\nPRODID:-//Morski Grafik Wacht//PL\\n";

            const formatDT = (d) => {
              const pad = (n) => n<10 ? '0'+n : n;
              return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
            };

            dashboardData.allSlotsAbsolute.forEach(slot => {
              if (slot.assigned.some(p => p.id === person.id)) {
                 ics += "BEGIN:VEVENT\\n";
                 ics += `SUMMARY:Wachta (${slot.start}-${slot.end})\\n`;
                 ics += `DTSTART:${formatDT(slot.absoluteStart)}\\n`;
                 ics += `DTEND:${formatDT(slot.absoluteEnd)}\\n`;

                 const others = slot.assigned.filter(p => p.id !== person.id).map(p=>p.name).join(', ');
                 const desc = others ? `Wachta razem z: ${others}` : 'Wachta solo';
                 ics += `DESCRIPTION:${desc}\\n`;
                 ics += "END:VEVENT\\n";
              }
            });
            ics += "END:VCALENDAR";

            const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `wachty_${person.name.replace(/\\s+/g, '_')}.ics`;
            a.click();
          };

          const handlePrint = () => {
            window.print();
          };

          // Export schedule to PDF
          const handleExportPDF = () => {
            if (!isGenerated || schedule.length === 0) {
              alert('Najpierw wygeneruj grafik, aby wyeksportować do PDF.');
              return;
            }

            try {
              // Check if jsPDF is available
              if (typeof window.jspdf === 'undefined') {
                alert('Biblioteka jsPDF nie jest dostępna. Spróbuj ponownie później.');
                return;
              }

              // Calculate endDate based on startDate and schedule length
              const startDateObj = new Date(startDate);
              const endDateObj = new Date(startDateObj);
              endDateObj.setDate(endDateObj.getDate() + schedule.length - 1);
              const endDate = endDateObj.toLocaleDateString(userLocale);
              const formattedStartDate = startDateObj.toLocaleDateString(userLocale);

              const { jsPDF } = window.jspdf;
              const doc = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: 'a4'
              });

              // Set font
              doc.setFontSize(16);
              doc.text('Morski Grafik Wacht PRO', 148, 15, { align: 'center' });

              doc.setFontSize(10);
              doc.text(`Okres: ${schedule.length} dni (${formattedStartDate} - ${endDate})`, 148, 22, { align: 'center' });

              // Prepare table data
              const headers = ['Data'];
              schedule[0]?.slots.forEach(slot => {
                headers.push(`${slot.start}-${slot.end}\\n(${slot.reqCrew}os)`);
              });

              const rows = [];
              schedule.forEach((daySchedule, dayIndex) => {
                const rowDate = new Date(startDate);
                rowDate.setDate(rowDate.getDate() + dayIndex);
                const dateStr = `D${daySchedule.day}\\n${rowDate.toLocaleDateString(userLocale, {day:'2-digit', month:'2-digit'})}`;

                const row = [dateStr];
                daySchedule.slots.forEach(slot => {
                  const names = slot.assigned.map(p => p.name).join('\\n');
                  row.push(names || '-');
                });
                rows.push(row);
              });

              // Add table
              doc.autoTable({
                head: [headers],
                body: rows,
                startY: 35,
                theme: 'grid',
                styles: {
                  fontSize: 7,
                  cellPadding: 2,
                  halign: 'center',
                  valign: 'middle'
                },
                headStyles: {
                  fillColor: [12, 74, 110],
                  fontStyle: 'bold',
                  fontSize: 8
                },
                columnStyles: {
                  0: { cellWidth: 20, fontStyle: 'bold', fillColor: [241, 245, 249] }
                },
                margin: { left: 10, right: 10 }
              });

              // Add crew statistics if available
              if (crewStats.length > 0) {
                const finalY = doc.lastAutoTable.finalY + 10;

                doc.setFontSize(12);
                doc.text(t('heading.crewStatisticsExport', userLocale), 14, finalY);

                const statsRows = crewStats.map(stat => [
                  stat.person.name,
                  stat.person.role || 'Załoga',
                  stat.watches.toString(),
                  `${stat.hours}h`
                ]);

                doc.autoTable({
                  head: [[t('label.crewMember', userLocale), t('common.role', userLocale), t('label.totalWatches', userLocale), t('common.hours', userLocale)]],
                  body: statsRows,
                  startY: finalY + 5,
                  theme: 'striped',
                  styles: {
                    fontSize: 9,
                    cellPadding: 3
                  },
                  headStyles: {
                    fillColor: [12, 74, 110],
                    fontStyle: 'bold'
                  },
                  margin: { left: 14 }
                });
              }

              // Add footer
              const pageCount = doc.internal.getNumberOfPages();
              for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(8);
                doc.setTextColor(128);
                doc.text(
                  `Wygenerowano: ${new Date().toLocaleString(userLocale || 'pl-PL')} | Strona ${i} z ${pageCount}`,
                  148,
                  205,
                  { align: 'center' }
                );
              }

              // Save the PDF
              const filenameSafeStartDate = startDateObj.toISOString().split('T')[0];
              const filenameSafeEndDate = endDateObj.toISOString().split('T')[0];
              const filename = `grafik_wacht_${filenameSafeStartDate}_${filenameSafeEndDate}.pdf`;
              doc.save(filename);

              setToastType('success');
              setCopyStatus('PDF wyeksportowany pomyślnie!');
              setTimeout(() => {
                setCopyStatus('');
                setToastType('success');
              }, 3000);
            } catch (error) {
              console.error('PDF export error:', error);
              alert('Błąd podczas eksportowania do PDF. Spróbuj ponownie.');
            }
          };

          // Export configuration to JSON file
          const handleExportConfig = () => {
            try {
              const config = {
                crew,
                slots,
                captainParticipates,
                version: '1.0',
                exportDate: new Date().toISOString()
              };

              const jsonString = JSON.stringify(config, null, 2);
              const blob = new Blob([jsonString], { type: 'application/json' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `wachtownik-config-${new Date().toISOString().split('T')[0]}.json`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);

              setToastType('success');
              setCopyStatus('Konfiguracja wyeksportowana!');
              setTimeout(() => {
                setCopyStatus('');
                setToastType('success');
              }, 3000);
            } catch (error) {
              console.error('Export error:', error);
              alert('Błąd podczas eksportowania konfiguracji.');
            }
          };

          // Import configuration from JSON file
          const handleImportConfig = () => {
            if (isReadOnly) {
              alert('Importowanie nie jest dostępne w trybie tylko do odczytu.');
              return;
            }

            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json,.json';

            input.onchange = (e) => {
              const file = e.target.files[0];
              if (!file) return;

              const reader = new FileReader();
              reader.onload = (event) => {
                try {
                  const config = JSON.parse(event.target.result);

                  // Validate configuration structure
                  if (!config || typeof config !== 'object') {
                    throw new Error('Nieprawidłowy format pliku konfiguracji.');
                  }

                  const { crew, slots } = config;
                  const MAX_ITEMS = 1000;

                  const isValidArrayOfObjects = (value) =>
                    Array.isArray(value) &&
                    value.length <= MAX_ITEMS &&
                    value.every(
                      (item) =>
                        item !== null &&
                        typeof item === 'object' &&
                        !Array.isArray(item)
                    );

                  if (!isValidArrayOfObjects(crew) || !isValidArrayOfObjects(slots)) {
                    throw new Error('Nieprawidłowy format pliku konfiguracji.');
                  }

                  // Import configuration
                  setCrew(crew);
                  setSlots(slots);
                  if (typeof config.captainParticipates === 'boolean') {
                    setCaptainParticipates(config.captainParticipates);
                  }

                  // Clear generated schedule as configuration changed
                  setSchedule([]);
                  setIsGenerated(false);

                  setToastType('success');
                  setCopyStatus('Konfiguracja zaimportowana!');
                  setTimeout(() => {
                    setCopyStatus('');
                    setToastType('success');
                  }, 3000);
                } catch (error) {
                  console.error('Import error:', error);
                  alert('Błąd podczas importowania konfiguracji: ' + error.message);
                }
              };
              reader.readAsText(file);
            };

            input.click();
          };

          // Helper function to build share URL (used by both link and QR sharing)
          const buildShareUrl = (readOnly = false) => {
            const state = { crew, slots, days, startDate, schedule, isGenerated, isNightMode, captainParticipates };
            const baseUrl = `${window.location.origin}${window.location.pathname}`;
            const jsonState = JSON.stringify(state);
            const prefix = readOnly ? 'share-readonly' : 'share';

            // For read-only mode, use simple base64 encoding (no compression needed for now)
            if (readOnly) {
              const encoded = btoa(encodeURIComponent(jsonState));
              return `${baseUrl}#${prefix}=${encoded}`;
            }

            // For regular sharing, use LZ-String compression
            // Check if LZ-String compression is available
            if (window.LZString && typeof window.LZString.compressToEncodedURIComponent === 'function') {
              try {
                // Use LZ-String compression for much smaller URLs
                const compressed = window.LZString.compressToEncodedURIComponent(jsonState);
                // Add 'c:' prefix to indicate compressed format
                return `${baseUrl}#${prefix}=c:${compressed}`;
              } catch (e) {
                console.error('LZString compression failed:', e);
                // Fall through to error - compression is required
              }
            }

            // If LZString is not available, show error message
            console.error('LZString library not loaded - cannot create share URL');
            return baseUrl; // Return base URL as fallback
          };

          const handleShare = (readOnly = false) => {
            const url = buildShareUrl(readOnly);
            navigator.clipboard.writeText(url).then(() => {
              setToastType('success');
              setCopyStatus(readOnly ? 'Link tylko do odczytu skopiowany!' : 'Skopiowano!');
              setTimeout(() => {
                setCopyStatus('');
                setToastType('success');
              }, 3000);
            });
          };

          const handleShowQR = () => {
            setShowQRModal(true);
            setQrError('');
          };

          useEffect(() => {
            if (showQRModal && qrCodeRef.current && window.QRCode) {
              // Clear previous QR code and errors
              qrCodeRef.current.innerHTML = '';
              setQrError('');

              try {
                // Generate share URL
                const url = buildShareUrl();

                // Check URL length - QR codes have practical limits
                // QR codes with lower error correction can hold more data:
                // - Version 40 with L (Low) error correction: ~2953 alphanumeric chars
                // - Version 40 with M (Medium) error correction: ~2331 alphanumeric chars
                // - Version 40 with H (High) error correction: ~1852 alphanumeric chars
                // We use 2900 as a practical limit with M error correction
                if (url.length > 2900) {
                  setQrError('Grafik jest zbyt złożony do zakodowania w QR. Użyj przycisku "Udostępnij" aby skopiować link.');
                  return;
                }

                // Generate QR code with M (Medium) error correction for better capacity
                new QRCode(qrCodeRef.current, {
                  text: url,
                  width: 256,
                  height: 256,
                  colorDark: isNightMode ? "#000000" : "#0c4a6e",
                  colorLight: isNightMode ? "#dc2626" : "#ffffff",
                  correctLevel: QRCode.CorrectLevel.M
                });
              } catch (error) {
                console.error('QR generation error:', error);
                setQrError('Nie udało się wygenerować kodu QR. Spróbuj użyć przycisku "Udostępnij" aby skopiować link.');
              }
            }
          }, [showQRModal, crew, slots, days, startDate, schedule, isGenerated, isNightMode, captainParticipates]);

          if (!isLoaded) return null;

          return (
            <div className={`min-h-screen font-sans pb-10 transition-colors duration-300 print:text-black print:bg-white ${isNightMode ? 'bg-black text-red-600' : 'text-slate-100'}`} data-night-mode={isNightMode}>

              {/* Skip to main content link for keyboard navigation */}
              <a href="#main-content" className="skip-link">
                Przejdź do głównej treści
              </a>

              <header className={`oa-header print:bg-white print:text-black print:shadow-none print:p-0 print:mb-6 ${isNightMode ? 'bg-zinc-950/90 border-b border-red-900/20' : ''}`}>
                <a href="../../index.html" title="OpenAnchor - Powrót do menu" aria-label="Powrót do menu" className="oa-back-btn print:hidden">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  <span>Menu</span>
                </a>
                <h1 className="oa-header-title">Morski Grafik Wacht PRO</h1>
                <div className="flex flex-wrap justify-center gap-1.5 sm:gap-2 print:hidden">
                  {/* Settings Group */}
                  <button
                    onClick={() => setIsNightMode(!isNightMode)}
                    className="oa-settings-btn"
                    title="Tryb Czerwonego Światła"
                    aria-label={isNightMode ? "Wyłącz tryb nocny" : "Włącz tryb nocny"}
                    aria-pressed={isNightMode}
                  >
                    <Icon name={isNightMode ? "Sun" : "Moon"} className="w-5 h-5" aria-hidden="true" />
                    </button>
                    <button
                      onClick={toggleLanguage}
                      className={`flex items-center space-x-2 px-3 py-2.5 min-h-[44px] rounded-lg transition border ${isNightMode ? 'border-red-800 hover:bg-red-950 text-red-500' : 'bg-sky-600 border-sky-500 hover:bg-sky-500 text-white'}`}
                      title={userLocale === 'pl-PL' ? "Switch to English" : "Przełącz na Polski"}
                      aria-label={userLocale === 'pl-PL' ? "Switch to English" : "Przełącz na Polski"}
                    >
                      <Icon name="Globe" className="w-5 h-5" aria-hidden="true" />
                      <span className="hidden md:inline text-xs font-mono">{userLocale === 'pl-PL' ? 'EN' : 'PL'}</span>
                    </button>

                    {/* History Controls - only if not read-only */}
                    {!isReadOnly && (
                      <>
                        <button
                          onClick={undo}
                          disabled={!canUndo}
                          className={`flex items-center space-x-2 px-3 py-2.5 min-h-[44px] rounded-lg transition border ${!canUndo ? 'opacity-40 cursor-not-allowed' : ''} ${isNightMode ? 'border-red-800 hover:bg-red-950 text-red-500' : 'bg-sky-600 border-sky-500 hover:bg-sky-500 text-white'}`}
                          title="Cofnij (Ctrl+Z)"
                          aria-label="Cofnij ostatnią zmianę"
                          aria-disabled={!canUndo}
                        >
                          <Icon name="Undo" className="w-5 h-5" aria-hidden="true" />
                        </button>
                        <button
