            .print\\:bg-slate-200 {

            .print\\:bg-transparent {

            .print\\:hover\\:bg-transparent:hover {

            .print\\:block {

            /* Force display of table view and hide mobile view for printing */

            .hidden.md\\:block,
            .hidden.print\\:block,
            div.hidden.md\\:block.print\\:block {

            /* Override Tailwind hidden for print:block elements */
            [class*="print:block"] {
                display: block !important;

            [class*="print:hidden"] {
                display: none !important;
            }
            /* Bulletproof: force schedule section and table visible in print */

                display: block !important;

            /* Remove overflow scrolling in print */

                margin-bottom: 0.2cm !important;

            /* Container resets */

            /* Table: optimized for A4 landscape, single page */
            table {

                border-collapse: collapse !important;
                table-layout: fixed !important;
                page-break-inside: avoid !important;

            table tbody td > div {
                font-size: 7px !important;

            table tbody td > div > div {
                padding: 0 !important;
                font-size: 7px !important;
                line-height: 1.3 !important;
                border: none !important;
                background: transparent !important;
            }
            /* Crew names: compact list */
            table tbody td .space-y-1,
            table tbody td .space-y-1\\.5 {
                gap: 0 !important;
            }
            table tbody td .space-y-1 > * + *,
            table tbody td .space-y-1\\.5 > * + * {

            }
            /* Make date column compact */
            table tbody td:first-child {

                font-weight: 700 !important;
            }

            table tbody td .flex-col {

            }

                gap: 2px !important;
            }
            /* Sticky column resets */
            .sticky-date-column {
                position: static !important;
            }
            /* Minimize gaps */

                gap: 0 !important;
            }
            /* Prevent page breaks inside schedule */
            .print\\:border-none,
            table,
            table tr {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

        /* Dark mode color scheme fix for inputs */
        [color-scheme="dark"] input[type="date"],
        [color-scheme="dark"] input[type="time"] {
            color-scheme: dark;
        }

        /* Mobile responsive improvements */
        @media (max-width: 639px) {
            /* Ensure minimum touch targets of 44px */
            .mobile-touch-target {
                min-height: 44px;
                min-width: 44px;
            }

            /* Better spacing for mobile cards */
            .mobile-card {
                padding: 1rem;
                margin-bottom: 0.75rem;
            }

            /* Sticky date headers on mobile */
            .mobile-sticky-header {
                position: sticky;
                top: 0;
                z-index: 10;
            }

            /* Improve button spacing on mobile */
            button {
                min-height: 44px;
            }

            /* Prevent iOS zoom on form controls */
            input,
            select,
            textarea {
                font-size: 16px;
            }

            /* Better text readability on mobile */
            body {
                font-size: 16px;
            }
        }

        /* Table sticky column for horizontal scroll */
        .sticky-date-column {
            position: sticky;
            left: 0;

        /* Desktop-specific sticky column adjustments */
        @media (min-width: 768px) {
            .sticky-date-column {
                /* Already set above, no additional changes needed */
            }

        /* Accessibility improvements */
        /* Skip link for keyboard navigation */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #0c4a6e;
            color: white;
            padding: 8px 16px;
            z-index: 100;
            text-decoration: none;
            border-radius: 0 0 4px 0;
        }

        .skip-link:focus {
            top: 0;
        }

        /* Enhanced focus indicators for keyboard navigation */
        *:focus-visible {
            outline: 3px solid #0ea5e9;
            outline-offset: 2px;
        }

        [data-night-mode="true"] *:focus-visible {
            outline-color: #dc2626;
        }

        /* Better focus indicators for buttons */
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: 3px solid #0ea5e9;
            outline-offset: 2px;
        }

        [data-night-mode="true"] button:focus-visible,
        [data-night-mode="true"] a:focus-visible,
        [data-night-mode="true"] input:focus-visible,
        [data-night-mode="true"] select:focus-visible,
        [data-night-mode="true"] textarea:focus-visible {
            outline-color: #dc2626;
        }

        /* Tooltip system */
        .tooltip-trigger {
            position: relative;
            display: inline-block;
        }

        .tooltip-content {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            z-index: 1000;
            background-color: #1e293b;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            transition: opacity 0.2s, visibility 0.2s;
            pointer-events: none;
        }

        .tooltip-content::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #1e293b transparent transparent transparent;
        }

        .tooltip-trigger:hover .tooltip-content,
        .tooltip-trigger:focus .tooltip-content {
            visibility: visible;
            opacity: 1;
        }

        [data-night-mode="true"] .tooltip-content {
            background-color: #450a0a;
            border: 1px solid #7f1d1d;
        }

        [data-night-mode="true"] .tooltip-content::after {
            border-color: #450a0a transparent transparent transparent;
        }
